<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        .toggle-checkbox:checked { right: 0; border-color: #10B981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10B981; }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-green-900 min-h-screen p-4 md:p-8">

    <div id="login-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center p-4">
        <div class="max-w-sm w-full bg-[#111] border border-gray-800 p-8 rounded-xl text-center">
            <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-amber-500">Security Check</h2>
            <input type="password" id="password-input" placeholder="Passwort eingeben" class="w-full bg-black border border-gray-700 text-white px-4 py-3 rounded-lg mb-4 text-center focus:border-green-500 focus:outline-none transition-colors">
            <button onclick="checkLogin()" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gray-200 transition-transform active:scale-95">UNLOCK</button>
            <p id="error-msg" class="text-red-500 text-xs mt-4 hidden">ZUGRIFF VERWEIGERT</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
        <h1 class="text-3xl font-black tracking-tighter uppercase">Controller</h1>
        <div class="flex items-center gap-2">
            <span class="text-gray-400 text-sm font-bold">ADMIN</span>
            <span class="relative flex h-3 w-3">
                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
        </div>
    </div>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="bg-[#111] border border-gray-800 rounded-xl p-8 relative overflow-hidden hover:border-gray-700 transition-colors">
            <div class="flex justify-between items-start mb-4">
                <span class="text-amber-400 font-bold tracking-wider text-sm uppercase">Wartungsmodus</span>
                <div class="relative inline-block w-14 h-7 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" name="toggle" id="maintenance-toggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-gray-700 appearance-none cursor-pointer transition-all duration-300 top-1 left-1 checked:left-7" onclick="toggleMaintenance()"/>
                    <label for="maintenance-toggle" class="toggle-label block overflow-hidden h-7 rounded-full bg-gray-700 cursor-pointer transition-colors duration-300"></label>
                </div>
            </div>
            <h2 id="status-text" class="text-3xl font-bold mb-2 leading-tight">Lädt...</h2>
            <p class="text-gray-500 text-sm">Schaltet die App live/offline.</p>
        </div>

        <div class="bg-[#111] border border-gray-800 rounded-xl p-8 flex flex-col justify-center gap-4 hover:border-gray-700 transition-colors">
            <span class="text-gray-400 font-bold tracking-wider text-sm uppercase mb-2">Navigation</span>
            
            <a href="dashboard.html" class="w-full py-4 px-4 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded-lg transition-all active:scale-95 flex items-center justify-between group">
                <span>Mission Control öffnen</span>
                <i data-lucide="bar-chart-2" class="text-[#D4AF37] group-hover:scale-110 transition-transform"></i>
            </a>

            <a href="index.html" class="w-full py-4 px-4 border border-gray-800 hover:border-gray-600 text-gray-400 hover:text-white font-medium rounded-lg transition-all flex items-center justify-between">
                <span>Zur Landing Page</span>
                <i data-lucide="external-link" class="w-4 h-4"></i>
            </a>
        </div>

    </div>

    <script>
        lucide.createIcons();
        const PASSWORD = "quantum2026"; 
        const SUPABASE_URL = 'https://aahsaqygohmykhagbihk.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E'; 
        
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkLogin() {
            const input = document.getElementById('password-input').value;
            if(input === PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                document.getElementById('login-overlay').classList.add('hidden');
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
                document.getElementById('password-input').value = '';
            }
        }

        if(localStorage.getItem('admin_logged_in') === 'true') {
            document.getElementById('login-overlay').classList.add('hidden');
        }

        async function loadMaintenanceStatus() {
            const { data } = await db.from('config').select('value').eq('key', 'maintenance').single();
            if (data) {
                const isOn = (data.value === 'true' || data.value === true);
                updateUI(isOn);
            } else {
                await db.from('config').insert([{ key: 'maintenance', value: false }]);
                updateUI(false);
            }
        }

        async function toggleMaintenance() {
            const toggle = document.getElementById('maintenance-toggle');
            const newVal = toggle.checked;
            updateUI(newVal);
            const { error } = await db.from('config').upsert({ key: 'maintenance', value: newVal });
            if(error) console.error("Fehler:", error);
        }

        function updateUI(isOn) {
            const statusText = document.getElementById('status-text');
            const toggle = document.getElementById('maintenance-toggle');
            toggle.checked = isOn;
            if(isOn) {
                statusText.innerText = "WARTUNG AKTIV";
                statusText.className = "text-3xl font-bold mb-2 leading-tight text-amber-500";
            } else {
                statusText.innerText = "LIVE (SYSTEM ON)";
                statusText.className = "text-3xl font-bold mb-2 leading-tight text-green-500";
            }
        }
        
        loadMaintenanceStatus();
    </script>
</body>
</html>
