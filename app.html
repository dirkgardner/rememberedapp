<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Remembered - Legends App</title>
    
    <!-- 1. EXTERNE SKRIPTE (Reihenfolge ist wichtig!) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase SDK muss VOR dem App-Code geladen werden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* BASIS DESIGN */
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .font-serif-custom { font-family: 'Playfair Display', serif; }
        .text-gold { color: #EAB308; }
        .bg-gold { background-color: #EAB308; }
        .border-gold { border-color: #EAB308; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none;  scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .glass-header {
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* VELVET ROPE (FEATURE GATES) STYLES */
        /* Macht das Element unscharf (Milchglas-Effekt) */
        .gate-blur {
            filter: blur(12px);
            pointer-events: none;
            user-select: none;
            transform: scale(1.05); /* Zoom, damit Ränder sauber bleiben */
        }
        /* Das Overlay mit dem Schloss-Icon */
        .gate-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 20;
        }
        /* Das Badge "SUPPORTER ONLY" */
        .gate-badge {
            border: 1px solid rgba(234, 179, 8, 0.5);
            background: rgba(0, 0, 0, 0.8);
            color: #EAB308;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-24 selection:bg-gold selection:text-black">

    <!-- NAVIGATION -->

        const db = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 1. INTELLIGENTES PERMISSIONS SYSTEM (DATABASE) ---
        const Permissions = {
            caps: ['read_content', 'search'], 
            currentPlan: 'FREE', // Fallback

            async init() {
                // A. User Check
                const { data: { session } } = await db.auth.getSession();
                
                if (!session) {
                    console.log("Gast-Modus: FREE Plan");
                    this.updateUI();
                    return; 
                }

                const userId = session.user.id;
                console.log("Eingeloggt:", session.user.email);

                // B. Subscription Check
                const { data: sub } = await db.from('user_subscriptions').select('plan_id').eq('user_id', userId).maybeSingle();

                if (!sub) {
                    console.log("Kein Abo gefunden -> FREE");
                    this.updateUI();
                    return;
                }

                // C. Plan Check
                const { data: plan } = await db.from('plans').select('key, name').eq('id', sub.plan_id).single();

                if (plan) {
                    console.log("Plan aktiv:", plan.name);
                    this.currentPlan = plan.name;
                    this.setCapabilities(plan.key);
                }
                
                this.updateUI();
            },

            setCapabilities(planKey) {
                // Mapping DB Key -> App Feature
                if (planKey === 'supporter') {
                    this.caps.push('view_trailers');
                } 
                else if (planKey === 'legacy') { 
                    this.caps.push('view_trailers', 'enable_push');
                }
            },

            updateUI() {
                const label = document.getElementById('plan-label');
                if(label) label.innerText = `${this.currentPlan} MEMBER`;
            },

            can(feature) { return this.caps.includes(feature); }
        };

        // --- DEV TOOLS (Zum Testen über Konsole) ---
        window.devLogin = async (email, password) => {
            console.log("Login versuch...");
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else location.reload();
        };
        window.devLogout = async () => { await db.auth.signOut(); location.reload(); };

        // --- APP LOGIC ---
        let allLegendsData = [];
        let club27Data = [];
        let currentDetailId = null;

        // PUSH GATE
        function enablePush() {
            if (!Permissions.can('enable_push')) {
                showVelvetRopeToast("Requires LEGACY+ Plan");
                return;
            }
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(p => {
                if (p === "granted") { 
                    document.getElementById('push-btn-text').innerText = "Push Enabled ✅"; 
                    document.getElementById('push-btn').classList.add('text-gold', 'border-gold');
                    new Notification("Remembered", { body: "Welcome to the Inner Circle." }); 
                }
            });
        }

        // ANNIVERSARY
        function checkAnniversaries() {
            const today = new Date(); const m = today.getMonth() + 1; const d = today.getDate(); const favIds = getFavorites(); let hit = null; let y = 0;
            allLegendsData.forEach(l => {
                if (l.death_date && favIds.includes(l.id)) {
                    let dDay, dMonth, dYear;
                    if (l.death_date.includes('.')) { const p=l.death_date.split('.'); dDay=parseInt(p[0]); dMonth=parseInt(p[1]); dYear=parseInt(p[2]); } 
                    else { const p=l.death_date.split('-'); dYear=parseInt(p[0]); dMonth=parseInt(p[1]); dDay=parseInt(p[2]); }
                    if (dMonth === m && dDay === d) { hit = l; y = today.getFullYear() - dYear; }
                }
            });
            const btn=document.getElementById('notif-btn'); const txt=document.getElementById('notif-text'); const bdg=document.getElementById('notif-badge');
            if (hit) {
                btn.onclick = () => openDetail(hit.id); 
                btn.classList.add('bg-red-500/10', 'pulse-red');
                txt.innerHTML = `<span class="text-red-400 font-bold">🕊️ ${hit.name}: ${y} years</span>`;
                bdg.classList.remove('hidden');
            }
        }

        async function loadLegends() { 
            await Permissions.init(); // 1. Rechte prüfen
            let { data: legends, error } = await db.from('legends').select('*').order('name'); 
            if (!error) { allLegendsData = legends; setHero(legends); renderGrid(legends); loadUserData(); checkAnniversaries(); } 
        }

        async function loadClub27Data() {
            let { data } = await db.from('club27').select('*');
            if (data) {
                club27Data = data.map(i => ({
                    id: i.id, name: i.name, dates: i.lifespan, category: 'CLUB 27',
                    image_url: i.image_url, bio: i.description, candles: 0 
                }));
            }
        }

        // UI HELPERS
        function openDetail(id) { 
            const l = allLegendsData.find(x => x.id === id) || club27Data.find(x => x.id === id); 
            if(!l) return; 
            currentDetailId=id; 
            
            document.getElementById('detail-img').src=l.image_url; 
            document.getElementById('detail-name').innerText=l.name; 
            document.getElementById('detail-dates').innerText = getDetailDate(l.dates, l.death_date); 
            document.getElementById('detail-headline').innerText=l.headline||""; 
            document.getElementById('detail-quote').innerText=l.quote||""; 
            document.getElementById('detail-bio').innerText=l.bio||""; 
            
            const v=document.getElementById('video-container'); 
            const wrapper=document.getElementById('video-wrapper');
            
            if(l.trailer_url) { 
                v.classList.remove('hidden');
                // GATE CHECK
                if (Permissions.can('view_trailers')) {
                    let i = ""; try { i=l.trailer_url.split('v=')[1].split('&')[0]; } catch(e){}
                    if(i) wrapper.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${i}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    let i = ""; try { i=l.trailer_url.split('v=')[1].split('&')[0]; } catch(e){}
                    const thumb = i ? `https://img.youtube.com/vi/${i}/hqdefault.jpg` : l.image_url;
                    wrapper.innerHTML = `
                        <img src="${thumb}" class="w-full h-full object-cover gate-blur opacity-50">
                        <div class="gate-overlay">
                            <div class="gate-badge">🔒 SUPPORTER ONLY</div>
                            <p class="text-white text-xs font-light tracking-widest uppercase">Video Locked</p>
                        </div>`;
                    wrapper.onclick = () => showVelvetRopeToast("Become a Supporter to watch.");
                }
            } else { v.classList.add('hidden'); } 
            
            const m=document.getElementById('music-btn'); 
            if(l.music_url) { m.classList.remove('hidden'); m.onclick=()=>window.open(l.music_url,'_blank'); } else m.classList.add('hidden'); 
            updateFavBtnState(id); 
            
            const countLabel = document.getElementById('candle-count'); 
            countLabel.innerText = (l.candles || 0).toLocaleString('de-DE');
            
            document.getElementById('detail-overlay').classList.remove('hidden'); 
            document.getElementById('radio-fab').classList.add('hidden');
        }

        function closeDetail() { document.getElementById('detail-overlay').classList.add('hidden'); document.getElementById('video-wrapper').innerHTML=""; document.getElementById('radio-fab').classList.remove('hidden'); }
        
        function showVelvetRopeToast(msg) {
            const div = document.createElement('div');
            div.className = "fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-900 border border-gold/30 text-gold px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl z-[70] animate-in fade-in slide-in-from-bottom-4";
            div.innerHTML = `<span class="opacity-70 mr-2">🔒</span> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function getDetailDate(d1, d2) { if(!d2) return d1; return `${d1 ? d1.split('–')[0].trim() : ''} – ${d2}`; }
        function getCardDate(d1, d2) { if(!d1) return ''; let b=d1.match(/(\d{4})/); b=b?b[0]:''; let d=d2?d2.split('-')[0]:''; return d ? `${b} – ${d}` : d1; }

        function hideAllViews() { ['home-view','profile-view','favorites-view','candles-view','settings-view'].forEach(id=>document.getElementById(id).classList.add('hidden')); }
        function showHome() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.remove('hidden'); document.getElementById('club27-header').classList.add('hidden'); renderGrid(allLegendsData); updateNavColors('home'); }
        async function showClub27() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.add('hidden'); document.getElementById('club27-header').classList.remove('hidden'); if(!club27Data.length) await loadClub27Data(); renderGrid(club27Data); updateNavColors('home'); }
        function showProfile() { hideAllViews(); document.getElementById('profile-view').classList.remove('hidden'); updateNavColors('profile'); }
        function showSettings() { hideAllViews(); document.getElementById('settings-view').classList.remove('hidden'); }
        function showFavoritesView() { hideAllViews(); document.getElementById('favorites-view').classList.remove('hidden'); renderGridSubset('favorites-grid', getFavorites()); }
        function showCandlesView() { hideAllViews(); document.getElementById('candles-view').classList.remove('hidden'); renderGridSubset('candles-grid', getMyCandles()); }
        
        function renderGrid(data) {
            const g=document.getElementById('legends-grid'); g.innerHTML=''; 
            data.forEach(l => g.innerHTML+=createCard(l));
            g.innerHTML += `<div onclick="openSuggestModal()" class="relative group aspect-[3/4] bg-white/5 rounded-xl border-2 border-dashed border-white/20 hover:border-gold flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-white/10"><div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center mb-4 group-hover:bg-gold text-gold group-hover:text-black transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg></div><p class="text-white font-bold text-sm text-center px-4">Forgotten someone?</p><p class="text-gray-400 text-xs text-center mt-1">Suggest an Icon</p></div>`;
        }
        function renderGridSubset(elId, ids) {
            const g=document.getElementById(elId); g.innerHTML='';
            const sub = allLegendsData.filter(x => ids.includes(x.id));
            if(sub.length) sub.forEach(l=>g.innerHTML+=createCard(l)); else g.innerHTML='<p class="col-span-2 text-gray-500">Nothing here yet.</p>';
        }

        function createCard(l) { 
            const i=l.image_url||'https://placehold.co/600x800'; const d=getCardDate(l.dates, l.death_date); const is27=l.category&&l.category.includes('27'); 
            const style=is27 ? "opacity-90 group-hover:opacity-100 border-red-900/20 hover:border-red-500/50" : "grayscale group-hover:grayscale-0 border-white/5 hover:border-gold/30";
            return `<div onclick="openDetail('${l.id}')" class="relative group aspect-[3/4] bg-gray-900 rounded-xl overflow-hidden border ${style} transition-all duration-500"><img src="${i}" class="w-full h-full object-cover ${is27?'':'grayscale group-hover:grayscale-0'}"><div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-90"></div><div class="absolute bottom-0 left-0 p-4 w-full"><h2 class="text-white font-bold text-lg leading-tight mb-1 group-hover:text-gold">${l.name}</h2><p class="text-[10px] font-mono opacity-90 ${is27?'text-red-500':'text-gold'}">${d}</p></div></div>`; 
        }
        
        function setHero(d) { const c=document.getElementById('hero-container'); if(d.length && c) { const r=d[Math.floor(Math.random()*d.length)]; c.innerHTML=`<div onclick="openDetail('${r.id}')" class="relative w-full h-full"><img src="${r.image_url}" class="absolute inset-0 w-full h-full object-cover object-top grayscale"><div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div><div class="absolute bottom-8 left-8"><span class="bg-gold text-black text-[10px] font-bold px-2 py-1 uppercase">Highlight</span><h2 class="text-4xl font-black mt-2 text-white">${r.name}</h2></div></div>`; } }
        
        function toggleSearch() { const s=document.getElementById('search-bar-container'); if(s.classList.contains('hidden')) { s.classList.remove('hidden'); document.getElementById('search-input').focus(); } else document.getElementById('search-bar-container').classList.add('hidden'); }
        function filterLegends() { const q=document.getElementById('search-input').value.toLowerCase(); renderGrid(allLegendsData.filter(l=>l.name.toLowerCase().includes(q))); }
        function filterCategory(c) { showHome(); renderGrid(allLegendsData.filter(l => l.category && l.category.includes(c))); }
        
        function loadUserData() { const n=localStorage.getItem('user_name'); if(n) { document.getElementById('profile-name').innerText=n; document.getElementById('profile-avatar').innerText=n[0]; } }
        function saveSettings() { const n=document.getElementById('settings-name-input').value; if(n) localStorage.setItem('user_name', n); showProfile(); }
        function resetApp() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
        function getFavorites() { return JSON.parse(localStorage.getItem('my_favorites') || '[]'); }
        function getMyCandles() { return JSON.parse(localStorage.getItem('my_candles') || '[]'); }
        function saveFavorites(a) { localStorage.setItem('my_favorites', JSON.stringify(a)); }
        function saveMyCandles(a) { localStorage.setItem('my_candles', JSON.stringify(a)); }
        function toggleFavorite() { if(!currentDetailId)return; let f=getFavorites(); if(f.includes(currentDetailId)) f=f.filter(i=>i!==currentDetailId); else f.push(currentDetailId); saveFavorites(f); updateFavBtnState(currentDetailId); }
        function updateFavBtnState(id) { const i=document.getElementById('fav-icon'); if(getFavorites().includes(id)) { i.setAttribute('fill','currentColor'); i.classList.add('text-red-500'); } else { i.setAttribute('fill','none'); i.classList.remove('text-red-500'); } }
        function toggleCandle() { const t=document.getElementById('candle-text'); if(t.innerText==="CANDLE LIT") return; t.innerText="CANDLE LIT"; t.classList.add('text-gold'); let c=getMyCandles(); if(!c.includes(currentDetailId)) { c.push(currentDetailId); saveMyCandles(c); } document.getElementById('candle-count').innerText = getMyCandles().length; }

        function updateNavColors(active) { const b="flex flex-col items-center space-y-1 text-gray-500"; const a="flex flex-col items-center space-y-1 text-gold"; ['nav-home','nav-search','nav-profile'].forEach(id=>document.getElementById(id).className=b); if(active==='home')document.getElementById('nav-home').className=a; if(active==='profile')document.getElementById('nav-profile').className=a; }

        function openSuggestModal() { document.getElementById('suggest-overlay').classList.remove('hidden'); }
        function closeSuggest() { document.getElementById('suggest-overlay').classList.add('hidden'); }
        async function submitSuggestion() {
            const n=document.getElementById('suggest-name').value; const c=document.getElementById('suggest-category').value; const r=document.getElementById('suggest-reason').value;
            if(!n)return; 
            document.getElementById('submit-suggest-btn').innerText="SENDING...";
            await db.from('suggestions').insert([{name:n, category:c, reason:r}]);
            closeSuggest(); alert("Sent!");
        }

        // START
        loadLegends();

    </script>
</body>
</html>
