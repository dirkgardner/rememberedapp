<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remembered – Legends App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body { background:#050505; color:white; font-family:'Inter',sans-serif }
.text-gold{color:#EAB308}
.bg-gold{background:#EAB308}
::-webkit-scrollbar{width:0}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body class="min-h-screen pb-24 fade-in">

<!-- HEADER -->
<header class="fixed top-0 w-full z-40 bg-black/80 backdrop-blur border-b border-white/10 p-4 text-center font-black tracking-widest">
  REMEMBERED
</header>

<!-- MAIN GRID -->
<main class="pt-20 px-4 max-w-7xl mx-auto">
  <div id="legends-grid"
       class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <!-- cards injected -->
  </div>
</main>

<!-- DETAIL OVERLAY -->
<div id="detail-overlay"
     class="hidden fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto">

  <button onclick="closeDetail()"
          class="mb-6 text-sm text-gray-400 hover:text-white">
    ← Zurück
  </button>

  <h2 id="detail-name" class="text-4xl font-black mb-6"></h2>

  <button onclick="toggleCandle()"
          class="flex items-center gap-4">
    <span id="candle-text"
          class="uppercase text-xs tracking-widest text-gray-400">
      Zünde eine Kerze an
    </span>
    <span id="candle-count"
          class="text-gold font-mono text-sm">0</span>
  </button>
</div>

<script>
/* ===============================
   SUPABASE (READ ONLY)
================================ */
const supabaseUrl = "https://aahsaqygohmykhagbihk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E";
const db = supabase.createClient(supabaseUrl, supabaseKey);

let allLegendsData = [];
let currentDetailId = null;

/* ===============================
   LOAD DATA
================================ */
async function loadLegends() {
  const { data, error } = await db
    .from("legends")
    .select("*")
    .order("name");

  if (error) {
    console.error("Supabase error:", error);
    return;
  }

  allLegendsData = data || [];
  renderGrid(allLegendsData);
}

/* ===============================
   GRID
================================ */
function renderGrid(legends) {
  const grid = document.getElementById("legends-grid");
  grid.innerHTML = "";

  legends.forEach(l => {
    grid.innerHTML += createCard(l);
  });
}

function createCard(l) {
  const img = l.image_url || "https://placehold.co/600x800?text=Legend";
  return `
    <div onclick="openDetail('${l.id}')"
         class="cursor-pointer border border-white/10 rounded-xl overflow-hidden hover:border-yellow-500 transition">
      <img src="${img}"
           class="w-full h-60 object-cover grayscale hover:grayscale-0 transition">
      <div class="p-3">
        <h3 class="font-bold">${l.name}</h3>
      </div>
    </div>
  `;
}

/* ===============================
   DETAIL
================================ */
function openDetail(id) {
  const legend = allLegendsData.find(l => l.id === id);
  if (!legend) return;

  currentDetailId = id;
  document.getElementById("detail-name").innerText = legend.name;

  const candles = getMyCandles().includes(id) ? 1 : 0;
  document.getElementById("candle-count").innerText = candles;

  document.getElementById("detail-overlay").classList.remove("hidden");
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.add("hidden");
}

/* ===============================
   LOCAL CANDLES (SAFE)
================================ */
function getMyCandles() {
  return JSON.parse(localStorage.getItem("my_candles") || "[]");
}

function saveMyCandles(id) {
  const c = getMyCandles();
  if (!c.includes(id)) {
    c.push(id);
    localStorage.setItem("my_candles", JSON.stringify(c));
  }
}

function toggleCandle() {
  const text = document.getElementById("candle-text");
  const count = document.getElementById("candle-count");

  if (text.innerText === "KERZE ENTZÜNDET") return;

  text.innerText = "KERZE ENTZÜNDET";
  text.classList.add("text-gold");
  count.innerText = "1";

  if (currentDetailId) {
    saveMyCandles(currentDetailId);
  }

  // ❌ KEIN DB WRITE
}

/* ===============================
   START
================================ */
document.addEventListener("DOMContentLoaded", loadLegends);
</script>

<!-- 🔥 DAS WAR DER FEHLENDE TEIL -->
<script src="js/guard.js"></script>

</body>
</html>
