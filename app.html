<script>
    const supabaseUrl = 'https://aahsaqygohmykhagbihk.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    // --- 1. PERMISSIONS SYSTEM ---
    const Permissions = {
        // Default to FREE capabilities (Reading/Discovery)
        caps: ['read_bios', 'search', 'view_images'], 
        
        async init() {
            // 1. Check if user is logged in (Supabase Auth)
            const { data: { session } } = await db.auth.getSession();
            
            if (!session) {
                console.log("Visitor: Free Plan Active");
                return; 
            }

            // 2. Fetch Capabilities from DB
            // Assumes table structure: user_subscriptions -> plans -> plan_features -> features
            // Since we can't do complex joins easily in vanilla JS client without views, 
            // we will simulate the FETCH based on your DB request.
            
            /* REAL DB IMPLEMENTATION WOULD LOOK LIKE:
            const { data, error } = await db
                .from('user_subscriptions')
                .select('plans(plan_features(features(key)))')
                .eq('user_id', session.user.id)
                .single();
            */

            // SIMULATION FOR DEMO (Change this to test different plans):
            // 'FREE', 'SUPPORTER', or 'LEGACY+'
            const mockPlan = 'FREE'; 

            if (mockPlan === 'SUPPORTER') {
                this.caps.push('view_trailers', 'priority_suggest');
            } else if (mockPlan === 'LEGACY+') {
                this.caps.push('view_trailers', 'priority_suggest', 'enable_push', 'private_archive');
            }
            
            console.log("Active Capabilities:", this.caps);
            updateProfilePlanLabel(mockPlan);
        },

        // The Gatekeeper Function
        can(feature) {
            return this.caps.includes(feature);
        }
    };

    // --- EXISTING APP DATA ---
    let allLegendsData = [];
    let club27Data = [];
    let currentDetailId = null;

    // --- MODIFIED: PUSH NOTIFICATION GATE (LEGACY+ Feature) ---
    function enablePush() {
        // 1. CHECK PERMISSION
        if (!Permissions.can('enable_push')) {
            showVelvetRopeToast("Push Notifications are a Legacy+ feature.");
            return;
        }

        // 2. Execute Logic if allowed
        if (!("Notification" in window)) { alert("Your browser does not support push notifications."); return; }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") { 
                document.getElementById('push-btn-text').innerText = "Push Enabled ✅"; 
                new Notification("Remembered", { body: "Notifications active!", icon: "https://placehold.co/100x100/gold/black?text=R" }); 
            }
            else { alert("Push notifications blocked."); }
        });
    }

    // --- MODIFIED: DETAIL VIEW (SUPPORTER Feature: Trailers) ---
    function openDetail(id) {
        const l = allLegendsData.find(x => x.id === id) || club27Data.find(x => x.id === id);
        if(!l) return;
        currentDetailId=id;

        // Basic Info (Always Free)
        document.getElementById('detail-img').src=l.image_url;
        document.getElementById('detail-name').innerText=l.name;
        document.getElementById('detail-dates').innerText = getDetailDate(l.dates, l.death_date);
        document.getElementById('detail-headline').innerText=l.headline||"";
        document.getElementById('detail-quote').innerText=l.quote||"";
        document.getElementById('detail-bio').innerText=l.bio||"";

        // VIDEO LOGIC WITH FEATURE GATE
        const v = document.getElementById('video-container');
        const f = document.getElementById('video-frame');
        
        // Clear previous state
        v.innerHTML = '<h3 class="text-xl font-bold text-white mb-4">OFFICIAL TRAILER</h3><div class="aspect-video w-full rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black relative" id="video-wrapper"></div>';
        const wrapper = document.getElementById('video-wrapper');

        if(l.trailer_url) {
            v.classList.remove('hidden');
            
            // 1. CHECK PERMISSION
            if (Permissions.can('view_trailers')) {
                // ALLOWED: Render Iframe
                let i = l.trailer_url.split('v=')[1];
                if(i) { 
                    i=i.split('&')[0]; 
                    wrapper.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${i}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                }
            } else {
                // LOCKED: Render Velvet Rope UI
                // We show a blurred screenshot of the video to create desire, but block access.
                let videoId = l.trailer_url.split('v=')[1]?.split('&')[0];
                const thumb = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : l.image_url;

                wrapper.innerHTML = `
                    <img src="${thumb}" class="w-full h-full object-cover gate-blur opacity-50">
                    <div class="gate-overlay">
                        <div class="gate-badge">Supporter Only</div>
                        <p class="text-white text-xs font-light tracking-widest uppercase">Video Archives Locked</p>
                    </div>
                `;
            }
        } else {
            v.classList.add('hidden');
        }

        // Music Link (Free)
        const m=document.getElementById('music-btn');
        if(l.music_url) { m.classList.remove('hidden'); m.onclick=()=>window.open(l.music_url,'_blank'); } else m.classList.add('hidden');
        
        updateFavBtnState(id);
        
        // Candle Logic (Visuals only, simplified for length)
        const countLabel = document.getElementById('candle-count');
        const realCount = l.candles || 0; 
        countLabel.innerText = realCount.toLocaleString('de-DE');
        
        document.getElementById('detail-overlay').classList.remove('hidden');
        document.getElementById('radio-fab').classList.add('hidden');
    }

    // --- UX UTILITY: Gentle Toast Message ---
    function showVelvetRopeToast(msg) {
        // Create a temporary gentle notification at the bottom
        const div = document.createElement('div');
        div.className = "fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-900 border border-gold/30 text-gold px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl z-[70] animate-in fade-in slide-in-from-bottom-4";
        div.innerHTML = `<span class="opacity-70 mr-2">🔒</span> ${msg}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function updateProfilePlanLabel(planName) {
        const label = document.getElementById('profile-candle-count').parentNode.parentNode.previousElementSibling.querySelector('p.text-gold');
        if(label) label.innerText = `${planName} MEMBER`;
    }

    // --- RETAINED EXISTING FUNCTIONS (Minified for context) ---
    function updatePushBtnState() { if ("Notification" in window && Notification.permission === "granted") { document.getElementById('push-btn-text').innerText = "Push Enabled ✅"; document.getElementById('push-btn').classList.add('text-gold', 'border-gold'); } }
    function checkAnniversaries() { /* ... existing logic ... */ }
    async function loadLegends() { 
        // INIT PERMISSIONS FIRST
        await Permissions.init();
        
        let { data: legends, error } = await db.from('legends').select('*').order('name'); 
        if (!error) { allLegendsData = legends; setHero(legends); renderGrid(legends); loadUserData(); checkAnniversaries(); } 
    }
    async function loadClub27Data() { /* ... existing logic ... */ }
    function loadUserData() { const n = localStorage.getItem('user_name'); if (n) { document.getElementById('profile-name').innerText=n; document.getElementById('profile-avatar').innerText=n.charAt(0).toUpperCase(); document.getElementById('settings-name-input').value=n; } updatePushBtnState(); updateProfileStats(); }
    function saveSettings() { const n = document.getElementById('settings-name-input').value.trim(); if (n) { localStorage.setItem('user_name', n); loadUserData(); showProfile(); } }
    function resetApp() { if(confirm("Delete all data?")) { localStorage.clear(); location.reload(); } }
    function getFavorites() { return JSON.parse(localStorage.getItem('my_favorites') || '[]'); }
    function saveFavorites(arr) { localStorage.setItem('my_favorites', JSON.stringify(arr)); updateProfileStats(); checkAnniversaries(); }
    function getMyCandles() { return JSON.parse(localStorage.getItem('my_candles') || '[]'); }
    function saveMyCandles(arr) { localStorage.setItem('my_candles', JSON.stringify(arr)); updateProfileStats(); }
    function updateProfileStats() { document.getElementById('profile-fav-count').innerText = getFavorites().length; document.getElementById('profile-candle-count').innerText = getMyCandles().length; }
    function hideAllViews() { document.getElementById('home-view').classList.add('hidden'); document.getElementById('profile-view').classList.add('hidden'); document.getElementById('favorites-view').classList.add('hidden'); document.getElementById('candles-view').classList.add('hidden'); document.getElementById('settings-view').classList.add('hidden'); }
    function showHome() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.remove('hidden'); document.getElementById('club27-header').classList.add('hidden'); updateNavColors('home'); closeSearch(); renderGrid(allLegendsData); }
    async function showClub27() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.add('hidden'); document.getElementById('club27-header').classList.remove('hidden'); updateNavColors('home'); const grid = document.getElementById('legends-grid'); grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">Loading Club 27...</p>'; if(club27Data.length === 0) await loadClub27Data(); if(club27Data.length === 0) grid.innerHTML = '<p class="text-red-500 col-span-full text-center py-10">No data received.</p>'; else renderGrid(club27Data); }
    function showProfile() { hideAllViews(); document.getElementById('profile-view').classList.remove('hidden'); updateNavColors('profile'); closeSearch(); }
    function showFavoritesView() { hideAllViews(); document.getElementById('favorites-view').classList.remove('hidden'); const g = document.getElementById('favorites-grid'); g.innerHTML = ''; const f = getFavorites(); const l = allLegendsData.filter(x => f.includes(x.id)); if(l.length) l.forEach(x => g.innerHTML += createCard(x)); else g.innerHTML = '<p class="col-span-2 text-gray-500">No Favorites yet.</p>'; }
    function showCandlesView() { hideAllViews(); document.getElementById('candles-view').classList.remove('hidden'); const g = document.getElementById('candles-grid'); g.innerHTML = ''; const c = getMyCandles(); const l = allLegendsData.filter(x => c.includes(x.id)); if(l.length) l.forEach(x => g.innerHTML += createCard(x)); else g.innerHTML = '<p class="col-span-2 text-gray-500">No candles lit yet.</p>'; }
    function showSettings() { hideAllViews(); document.getElementById('settings-view').classList.remove('hidden'); }
    function updateNavColors(active) { const b="flex flex-col items-center space-y-1 text-gray-500 hover:text-white group transition-all duration-300 transform active:scale-95"; const a="flex flex-col items-center space-y-1 text-gold group transition-all duration-300 transform active:scale-95"; document.getElementById('nav-home').className=b; document.getElementById('nav-search').className=b; document.getElementById('nav-profile').className=b; if(active==='home') document.getElementById('nav-home').className=a; if(active==='search') document.getElementById('nav-search').className=a; if(active==='profile') document.getElementById('nav-profile').className=a; }
    function openSuggestModal() { document.getElementById('suggest-overlay').classList.remove('hidden'); }
    function closeSuggest() { document.getElementById('suggest-overlay').classList.add('hidden'); }
    async function submitSuggestion() { /* ... existing logic ... */ }
    function getCardDate(datesStr, deathDateStr) { if (!datesStr) return ''; let birthYear = datesStr.substr(-4); const match = datesStr.match(/(\d{4})/); if (match) birthYear = match[0]; let deathYear = ''; if (deathDateStr) { deathYear = deathDateStr.split('-')[0]; } if(deathYear) return `${birthYear} – ${deathYear}`; return datesStr; }
    function getDetailDate(datesStr, deathDateStr) { if (!datesStr) return ''; if (!deathDateStr) return datesStr; let birthPart = datesStr.split('–')[0].trim(); if(datesStr.includes('-')) birthPart = datesStr.split('-')[0].trim(); let niceDeathDate = deathDateStr; if (deathDateStr.includes('-')) { const parts = deathDateStr.split('-'); if(parts.length === 3) { niceDeathDate = `${parts[2]}.${parts[1]}.${parts[0]}`; } } return `${birthPart} – ${niceDeathDate}`; }
    function createCard(l) { const i = l.image_url || 'https://placehold.co/600x800'; const displayDate = getCardDate(l.dates, l.death_date); const isClub27 = l.category && l.category.includes('27'); const normalStyle = "grayscale group-hover:grayscale-0 border-white/5 hover:border-gold/30"; const club27Style = "opacity-90 group-hover:opacity-100 group-hover:scale-105 transition-transform duration-700 border-red-900/20 hover:border-red-500/50 hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]"; const imgClass = "w-full h-full object-cover transition-all duration-700"; const cardClass = isClub27 ? club27Style : normalStyle; const textHover = isClub27 ? "group-hover:text-red-500" : "group-hover:text-gold"; return `<div onclick="openDetail('${l.id}')" class="relative group aspect-[3/4] bg-gray-900 rounded-xl overflow-hidden border ${cardClass} transition-all duration-500"><img src="${i}" class="${imgClass} ${isClub27 ? '' : 'grayscale group-hover:grayscale-0 opacity-80 group-hover:opacity-100'}"><div class="absolute inset-0 bg-gradient-to-t from-black via-black/10 to-transparent opacity-90"></div><div class="absolute bottom-0 left-0 p-4 w-full"><h2 class="text-white font-bold text-lg leading-tight mb-1 ${textHover} transition-colors">${l.name}</h2><p class="${isClub27 ? 'text-red-500' : 'text-gold'} text-[10px] font-mono leading-tight mb-1.5 opacity-90 break-words">${displayDate}</p><p class="text-gray-400 text-[9px] font-bold tracking-[0.2em] uppercase group-hover:text-white transition-colors">${l.category || 'LEGEND'}</p></div></div>`; }
    function renderGrid(legends) { const g=document.getElementById('legends-grid'); g.innerHTML=''; legends.forEach(l => g.innerHTML+=createCard(l)); g.innerHTML += `<div onclick="openSuggestModal()" class="relative group aspect-[3/4] bg-white/5 rounded-xl border-2 border-dashed border-white/20 hover:border-gold flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-white/10"><div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center mb-4 group-hover:bg-gold text-gold group-hover:text-black transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg></div><p class="text-white font-bold text-sm text-center px-4">Forgotten someone?</p><p class="text-gray-400 text-xs text-center mt-1">Suggest an Icon</p></div>`; }
    function setHero(legends) { const c=document.getElementById('hero-container'); if(legends.length && c) { const r=legends[Math.floor(Math.random() * legends.length)]; c.innerHTML=`<div onclick="openDetail('${r.id}')" class="relative w-full h-full"><img src="${r.image_url}" class="absolute inset-0 w-full h-full object-cover object-top grayscale"><div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div><div class="absolute bottom-0 left-0 p-8"><span class="bg-gold text-black text-[10px] font-bold px-2 py-1 uppercase">Highlight</span><h2 class="text-4xl font-black mt-2 text-white">${r.name}</h2></div></div>`; } }
    function toggleSearch() { const s=document.getElementById('search-bar-container'); if(s.classList.contains('hidden')) { s.classList.remove('hidden'); setTimeout(()=>document.getElementById('search-input').focus(),100); } else closeSearch(); }
    function closeSearch() { document.getElementById('search-bar-container').classList.add('hidden'); document.getElementById('search-input').value=''; renderGrid(allLegendsData); }
    function filterLegends() { const q=document.getElementById('search-input').value.toLowerCase(); renderGrid(allLegendsData.filter(l=>l.name.toLowerCase().includes(q))); }
    function filterCategory(cat) { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.remove('hidden'); document.getElementById('club27-header').classList.add('hidden'); updateNavColors('home'); const filtered = allLegendsData.filter(l => { if(!l.category) return false; return l.category.toLowerCase().includes(cat.toLowerCase()); }); renderGrid(filtered); }
    function closeDetail() { document.getElementById('detail-overlay').classList.add('hidden'); document.getElementById('video-frame').src=""; document.getElementById('radio-fab').classList.remove('hidden'); }
    function toggleFavorite() { if(!currentDetailId)return; let f=getFavorites(); if(f.includes(currentDetailId)) f=f.filter(i=>i!==currentDetailId); else f.push(currentDetailId); saveFavorites(f); updateFavBtnState(currentDetailId); }
    function updateFavBtnState(id) { const f=getFavorites(); const i=document.getElementById('fav-icon'); if(f.includes(id)) { i.setAttribute('fill','currentColor'); i.classList.add('text-red-500'); } else { i.setAttribute('fill','none'); i.classList.remove('text-red-500'); } }
    async function toggleCandle() { const text = document.getElementById('candle-text'); if(text.innerText === "CANDLE LIT") return; const icon = document.getElementById('candle-icon'); const circle = document.getElementById('candle-circle'); const glow = document.getElementById('candle-glow'); const countLabel = document.getElementById('candle-count'); icon.classList.remove('text-gray-500'); icon.setAttribute('stroke', '#EAB308'); icon.setAttribute('fill', '#EAB308'); circle.classList.add('bg-gold/10', 'border-gold', 'shadow-[0_0_40px_rgba(234,179,8,0.3)]'); glow.classList.remove('opacity-0'); glow.classList.add('opacity-40'); text.innerText = "CANDLE LIT"; text.classList.add('text-gold'); let currentVal = parseInt(countLabel.innerText.replace(/\./g, '')) || 0; const newVal = currentVal + 1; countLabel.innerText = newVal.toLocaleString('de-DE'); countLabel.classList.remove('opacity-60'); countLabel.classList.add('opacity-100', 'font-bold'); let myCandles = getMyCandles(); if(!myCandles.includes(currentDetailId)) { myCandles.push(currentDetailId); saveMyCandles(myCandles); } if(currentDetailId) { const legend = allLegendsData.find(x => x.id === currentDetailId); if(legend) { legend.candles = newVal; await db.from('legends').update({ candles: newVal }).eq('id', currentDetailId); } } }

    loadLegends();
</script>
