<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remembered – Legends App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">

<style>
body { background:#050505; color:white; font-family:'Inter',sans-serif }
.text-gold{color:#EAB308}
.bg-gold{background:#EAB308}
::-webkit-scrollbar{width:0}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body class="min-h-screen pb-24">

<!-- ⚠️ DEIN KOMPLETTES UI BLEIBT HIER UNVERÄNDERT -->
<!-- Header, Views, Grid, Overlay etc. -->
<!-- NICHTS hier anfassen -->

<script>
/* ===============================
   SUPABASE (READ ONLY!)
================================ */
const supabaseUrl = "https://aahsaqygohmykhagbihk.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E";
const db = supabase.createClient(supabaseUrl, supabaseKey);

let allLegendsData = [];
let currentDetailId = null;

/* ===============================
   DATA LOAD (SAFE)
================================ */
async function loadLegends() {
  const { data, error } = await db
    .from("legends")
    .select("*")
    .order("name");

  if (error) {
    console.error("Supabase error:", error);
    return;
  }

  allLegendsData = data || [];
  renderGrid(allLegendsData);
}

/* ===============================
   GRID RENDER (🔥 WAR DER FEHLER)
================================ */
function renderGrid(legends) {
  const grid = document.getElementById("legends-grid");
  if (!grid) return;

  grid.innerHTML = "";

  legends.forEach(l => {
    grid.innerHTML += createCard(l);
  });
}

/* ===============================
   CARD TEMPLATE (MINIMAL)
================================ */
function createCard(l) {
  const img = l.image_url || "https://placehold.co/600x800";
  return `
    <div onclick="openDetail('${l.id}')" 
         class="aspect-[3/4] bg-black rounded-xl overflow-hidden border border-white/10 cursor-pointer">
      <img src="${img}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition">
      <div class="p-3">
        <h3 class="font-bold">${l.name}</h3>
      </div>
    </div>
  `;
}

/* ===============================
   DETAIL OPEN (BASIS)
================================ */
function openDetail(id) {
  currentDetailId = id;
  document.getElementById("detail-overlay")?.classList.remove("hidden");
}

/* ===============================
   LOCAL USER STATE
================================ */
function getMyCandles() {
  return JSON.parse(localStorage.getItem("my_candles") || "[]");
}
function saveMyCandles(id) {
  const c = getMyCandles();
  if (!c.includes(id)) {
    c.push(id);
    localStorage.setItem("my_candles", JSON.stringify(c));
  }
}

/* ===============================
   CANDLE (SAFE – NO DB WRITE)
================================ */
function toggleCandle() {
  const text = document.getElementById("candle-text");
  const count = document.getElementById("candle-count");

  if (!text || !count) return;
  if (text.innerText === "KERZE ENTZÜNDET") return;

  text.innerText = "KERZE ENTZÜNDET";
  text.classList.add("text-gold");

  let val = parseInt(count.innerText || "0");
  val++;
  count.innerText = val.toLocaleString("de-DE");

  if (currentDetailId) {
    saveMyCandles(currentDetailId);
  }

  // 🚫 KEIN SUPABASE UPDATE
}

/* ===============================
   START
================================ */
document.addEventListener("DOMContentLoaded", () => {
  loadLegends();
});
</script>

</body>
</html>
