const db = supabase.createClient(supabaseUrl, supabaseKey);

let allLegendsData = [];
let currentDetailId = null;

/* ===============================
   LOAD DATA (SAFE – SELECT ONLY)
================================ */
async function loadLegends() {
  const { data, error } = await db
    .from("legends")
    .select("*")
    .order("name");

  if (!error && data) {
    allLegendsData = data;
    renderGrid(data);
  }
}

/* ===============================
   LOCAL STORAGE (USER STATE)
================================ */
function getMyCandles() {
  return JSON.parse(localStorage.getItem("my_candles") || "[]");
}
function saveMyCandles(id) {
  const c = getMyCandles();
  if (!c.includes(id)) {
    c.push(id);
    localStorage.setItem("my_candles", JSON.stringify(c));
  }
}

/* ===============================
   CANDLE ACTION (SAFE VERSION)
================================ */
function toggleCandle() {
  const text = document.getElementById("candle-text");
  if (text.innerText === "KERZE ENTZÜNDET") return;

  // UI ONLY
  text.innerText = "KERZE ENTZÜNDET";
  text.classList.add("text-gold");

  const countLabel = document.getElementById("candle-count");
  let val = parseInt(countLabel.innerText || "0");
  val++;
  countLabel.innerText = val.toLocaleString("de-DE");

  // LOCAL MEMORY ONLY (SECURE)
  if (currentDetailId) {
    saveMyCandles(currentDetailId);
  }

  // ❌ KEIN DB UPDATE HIER
  // Kerzen werden später serverseitig gezählt (RPC)
}
