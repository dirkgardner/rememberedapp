<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Remembered – Legends</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body { background:#050505; color:white; font-family:'Inter',sans-serif }
.text-gold{color:#EAB308}
.bg-gold{background:#EAB308}
.border-gold{border-color:#EAB308}

.legend-card{background:#000;border:1px solid rgba(255,255,255,.1);transition:.4s}
.legend-card:hover{border-color:#fff;box-shadow:0 0 30px rgba(255,255,255,.5)}

.club27-card{background:#000;border:1px solid rgba(153,27,27,.3);transition:.4s}
.club27-card:hover{border-color:#EF4444;box-shadow:0 0 30px rgba(220,38,38,.6)}

.candle-glow-active{box-shadow:0 0 30px 5px rgba(234,179,8,.4)}
.glass-header{background:rgba(0,0,0,.4);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08)}
</style>
</head>

<body class="pb-24">

<header class="fixed top-0 w-full z-40 glass-header h-16 flex items-center justify-between px-4">
    <div class="font-bold tracking-widest">REMEMBERED</div>
</header>

<main id="home-view" class="pt-24 px-4 max-w-7xl mx-auto">
    <div id="legends-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</main>

<!-- DETAIL OVERLAY -->
<section id="detail-overlay" class="hidden fixed inset-0 z-[60] bg-black overflow-y-auto">

<div class="fixed top-4 right-4 z-[70] flex gap-3">
<button onclick="toggleFavorite()" class="w-10 h-10 rounded-full bg-black/60 border border-white/10 flex items-center justify-center">
<svg id="fav-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364L12 21.364 4.318 12.682a4.5 4.5 0 010-6.364z"/>
</svg>
</button>

<button onclick="closeDetail()" class="w-10 h-10 rounded-full bg-black/60 border border-white/10 text-xl">✕</button>
</div>

<div class="relative h-[70vh]">
<img id="detail-img" class="absolute inset-0 w-full h-full object-cover grayscale">
<div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>

<div class="absolute bottom-8 left-6 right-6">
<h1 id="detail-name" class="text-4xl font-black"></h1>
<p id="detail-dates" class="text-gold text-sm mt-1"></p>
<p id="detail-headline" class="italic text-gray-300 mt-2"></p>
</div>
</div>

<div class="px-6 py-10 max-w-3xl mx-auto">
<blockquote id="detail-quote" class="italic text-gray-300 border-l-2 border-gold pl-4 mb-8"></blockquote>
<p id="detail-bio" class="text-gray-300 leading-relaxed"></p>

<div class="mt-14 flex flex-col items-center">
<div id="candle-circle" onclick="toggleCandle()" class="w-24 h-24 rounded-full border border-white/10 flex items-center justify-center cursor-pointer">
<span id="candle-icon">🕯️</span>
</div>
<p id="candle-text" class="mt-4 text-xs tracking-widest">LIGHT A CANDLE</p>
<p class="text-gold mt-2"><span id="candle-count">0</span></p>
</div>

<button onclick="closeDetail()" class="mt-16 w-full py-4 border border-white/20 rounded-full uppercase tracking-widest text-xs">
Zurück zur Gallery
</button>
</div>
</section>
<script>
const supabaseUrl = 'https://aahsaqygohmykhagbihk.supabase.co';
const supabaseKey = 'PUBLIC_KEY_HERE';
const db = supabase.createClient(supabaseUrl, supabaseKey);

let allLegendsData=[];
let currentDetailId=null;

async function loadLegends(){
const {data}=await db.from('legends').select('*').order('name');
if(data){allLegendsData=data;renderGrid(data)}
}

function renderGrid(d){
const g=document.getElementById('legends-grid');
g.innerHTML='';
d.forEach(l=>g.innerHTML+=createCard(l));
}

function createCard(l){
const is27=l.category?.includes('27');
return `
<div onclick="openDetail('${l.id}')" class="${is27?'club27-card':'legend-card'} aspect-[3/4] rounded-xl overflow-hidden cursor-pointer">
<img src="${l.image_url}" class="w-full h-full object-cover">
<div class="absolute bottom-0 p-3">
<h2 class="font-bold">${l.name}</h2>
<p class="text-xs ${is27?'text-red-500':'text-gold'}">${l.dates||''}</p>
</div>
</div>`;
}

function openDetail(id){
const l=allLegendsData.find(x=>x.id===id);
if(!l)return;
currentDetailId=id;

detailImg.src=l.image_url;
detailName.innerText=l.name;
detailDates.innerText=l.dates||'';
detailHeadline.innerText=l.headline||'';
detailQuote.innerText=l.quote||'';
detailBio.innerText=l.bio||'';

document.getElementById('detail-overlay').classList.remove('hidden');
}

function closeDetail(){
document.getElementById('detail-overlay').classList.add('hidden');
}

function toggleFavorite(){
let f=JSON.parse(localStorage.getItem('fav')||'[]');
f.includes(currentDetailId)?f=f.filter(i=>i!==currentDetailId):f.push(currentDetailId);
localStorage.setItem('fav',JSON.stringify(f));
}

function toggleCandle(){
let c=JSON.parse(localStorage.getItem('candles')||'[]');
if(c.includes(currentDetailId))return;
c.push(currentDetailId);
localStorage.setItem('candles',JSON.stringify(c));
candleText.innerText='CANDLE LIT';
candleCircle.classList.add('candle-glow-active');
}

loadLegends();
</script>
</body>
</html>
