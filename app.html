<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Remembered - Legends App</title>
    
    <!-- 1. EXTERNE BIBLIOTHEKEN (Reihenfolge ist wichtig!) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- WICHTIG: Supabase muss VOR dem eigenen Script geladen werden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* BASIS DESIGN */
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .font-serif-custom { font-family: 'Playfair Display', serif; }
        .text-gold { color: #EAB308; }
        .bg-gold { background-color: #EAB308; }
        .border-gold { border-color: #EAB308; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none;  scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .glass-header {
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* --- VELVET ROPE (FEATURE GATES) STYLES --- */
        /* Macht das Element unscharf (Milchglas-Effekt) */
        .gate-blur {
            filter: blur(12px);
            pointer-events: none;
            user-select: none;
            transform: scale(1.05); /* Leichter Zoom damit Ränder nicht weiß werden */
        }
        /* Das Overlay mit dem Schloss-Icon */
        .gate-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            z-index: 20;
        }
        /* Das Badge "SUPPORTER ONLY" */
        .gate-badge {
            border: 1px solid rgba(234, 179, 8, 0.5);
            background: rgba(0, 0, 0, 0.8);
            color: #EAB308;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-24 selection:bg-gold selection:text-black">

    <!-- NAVIGATION -->
    <header class="fixed top-0 w-full z-40 glass-header h-16 flex items-center justify-between px-4 md:px-8 transition-all duration-300" id="main-header">
        <nav class="flex-1 overflow-x-auto no-scrollbar mask-linear-fade">
            <div class="flex items-center space-x-6 md:space-x-8 pr-4">
                <button onclick="showHome()" class="text-sm md:text-base font-light text-white hover:text-gold uppercase tracking-widest whitespace-nowrap transition-colors">All</button>
                <button onclick="showClub27()" class="text-sm md:text-base font-light text-gray-300 hover:text-white uppercase tracking-widest whitespace-nowrap transition-colors group">Club <span class="text-red-600 font-bold group-hover:text-red-500 transition-colors">27</span></button>
                <button onclick="filterCategory('Musician')" class="text-sm md:text-base font-light text-gray-400 hover:text-white uppercase tracking-widest whitespace-nowrap transition-colors">Musician</button>
                <button onclick="filterCategory('Actor')" class="text-sm md:text-base font-light text-gray-400 hover:text-white uppercase tracking-widest whitespace-nowrap transition-colors">Actor</button>
                <button onclick="filterCategory('Sport')" class="text-sm md:text-base font-light text-gray-400 hover:text-white uppercase tracking-widest whitespace-nowrap transition-colors">Sport Icon</button>
            </div>
        </nav>
        <div class="flex items-center space-x-5 pl-4 shadow-[-10px_0_20px_rgba(0,0,0,0.5)]">
            <button onclick="toggleSearch()" class="text-gray-300 hover:text-white transition-colors"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
            <button onclick="showProfile()" class="relative group">
                <div class="w-8 h-8 rounded-full bg-gold flex items-center justify-center hover:scale-105 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
                </div>
                <div id="header-notif-dot" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-black animate-ping"></div>
                <div id="header-notif-dot-static" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-black"></div>
            </button>
        </div>
    </header>

    <!-- SEARCH OVERLAY -->
    <div id="search-bar-container" class="hidden fixed top-16 w-full z-30 bg-black/95 backdrop-blur-xl border-b border-gold/20 px-4 py-3 shadow-2xl animate-in fade-in slide-in-from-top-2">
        <div class="relative max-w-7xl mx-auto flex items-center">
            <input type="text" id="search-input" onkeyup="filterLegends()" placeholder="Search name..." class="w-full bg-white/10 border border-white/10 rounded-full py-3 pl-4 pr-4 text-white placeholder-gray-400 focus:outline-none focus:border-gold transition-all">
            <button onclick="closeSearch()" class="ml-4 text-sm text-gray-400 hover:text-white">X</button>
        </div>
    </div>

    <!-- MAIN VIEWS -->
    <main id="home-view" class="pt-24 px-4 max-w-7xl mx-auto fade-in">
        <div id="hero-section" class="mb-12 transition-all duration-500">
            <h2 class="text-2xl font-bold text-white mb-1 tracking-tight">For You – Today</h2>
            <p class="text-gray-400 text-sm mb-6 font-medium">Remember the Icons</p>
            <div id="hero-container" class="relative w-full h-[500px] md:h-[600px] rounded-3xl overflow-hidden bg-gray-900 border border-white/10 shadow-2xl cursor-pointer">
                <div class="w-full h-full animate-pulse bg-gray-900 flex items-center justify-center"><p class="text-gold opacity-50">Loading...</p></div>
            </div>
        </div>

        <div id="club27-header" class="hidden mb-12 relative rounded-3xl overflow-hidden border border-red-900/30">
            <div class="absolute inset-0 bg-gradient-to-br from-black via-[#2a0505] to-black"></div>
            <div class="relative z-10 p-8 md:p-12 flex flex-col justify-end min-h-[300px]">
                <h1 class="text-6xl md:text-8xl font-serif-custom text-white mb-4 leading-none">CLUB <span class="text-red-600 italic">27</span></h1>
                <p class="text-gray-300 text-sm md:text-base leading-relaxed font-light max-w-lg border-l-2 border-red-600 pl-4">Legends gone too soon. Their art remains immortal.</p>
            </div>
        </div>

        <div id="legends-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
    </main>

    <!-- OTHER VIEWS (Hidden by default) -->
    <main id="favorites-view" class="hidden pt-24 px-4 max-w-7xl mx-auto fade-in h-screen">
        <h2 class="text-2xl font-bold text-white mb-8">Your Favorites</h2>
        <div id="favorites-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
    </main>

    <main id="candles-view" class="hidden pt-24 px-4 max-w-7xl mx-auto fade-in h-screen">
        <h2 class="text-2xl font-bold text-white mb-8">Your Candles</h2>
        <div id="candles-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
    </main>

    <main id="settings-view" class="hidden pt-24 px-6 max-w-lg mx-auto fade-in h-screen">
        <h2 class="text-2xl font-bold text-white mb-8">Settings</h2>
        <div class="space-y-6">
            <input type="text" id="settings-name-input" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white">
            <button id="push-btn" onclick="enablePush()" class="w-full bg-white/5 border border-white/10 text-gray-300 font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-white/10 hover:text-white transition">
                <span>Enable Push Notifications</span>
                <!-- Lock Icon for Gate -->
                <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gold border border-gold/30">LEGACY+</span>
            </button>
            <button onclick="saveSettings()" class="w-full bg-gold text-black font-bold py-4 rounded-xl">SAVE</button>
            <button onclick="resetApp()" class="w-full text-red-500 py-3 text-sm">Delete All Data</button>
        </div>
    </main>

    <section id="profile-view" class="hidden pt-28 px-6 max-w-lg mx-auto fade-in h-screen">
        <div class="flex flex-col items-center mb-10">
            <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-gold to-yellow-600 p-1 mb-4 shadow-lg shadow-gold/20">
                <div class="w-full h-full rounded-full bg-black flex items-center justify-center overflow-hidden">
                    <span id="profile-avatar" class="text-3xl font-bold text-white">ME</span>
                </div>
            </div>
            <h2 id="profile-name" class="text-2xl font-bold text-white">My Profile</h2>
            <p id="plan-label" class="text-gold text-xs tracking-[0.2em] uppercase mt-1 opacity-80">Free Member</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div onclick="showCandlesView()" class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center cursor-pointer hover:bg-white/10 transition group">
                <p id="profile-candle-count" class="text-2xl font-bold text-white group-hover:text-gold">0</p>
                <p class="text-gray-500 text-[10px] uppercase mt-1">Candles</p>
            </div>
            <div onclick="showFavoritesView()" class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center cursor-pointer group">
                <p id="profile-fav-count" class="text-2xl font-bold text-white group-hover:text-gold">0</p>
                <p class="text-gray-500 text-[10px] uppercase mt-1">Favorites</p>
            </div>
        </div>
        <div class="space-y-3">
            <button onclick="showSettings()" class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition"><span class="text-sm font-medium text-gray-300">Account & Settings</span></button>
            <button id="notif-btn" class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition">
                <span id="notif-text" class="text-sm font-medium text-gray-300">No new messages</span>
            </button>
        </div>
    </section>

    <!-- SUGGEST OVERLAY -->
    <div id="suggest-overlay" class="hidden fixed inset-0 z-50 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
        <div class="bg-gray-900 border border-white/10 rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
            <button onclick="closeSuggest()" class="absolute top-4 right-4 text-gray-400 hover:text-white">X</button>
            <h2 class="text-xl font-bold text-white mb-1">Suggest an Icon</h2>
            <input type="text" id="suggest-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white mt-4" placeholder="Name...">
            <button onclick="submitSuggestion()" id="submit-suggest-btn" class="w-full bg-gold text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition-colors mt-4">SEND</button>
        </div>
    </div>

    <!-- DETAIL OVERLAY (MIT VELVET ROPE LOGIC) -->
    <div id="detail-overlay" class="hidden fixed inset-0 z-50 bg-black text-white overflow-y-auto animate-in fade-in duration-300">
        <div class="fixed top-6 right-6 z-[60] flex space-x-3">
            <button id="music-btn" class="hidden bg-black/50 p-3 rounded-full border border-white/20 hover:border-gold text-white hover:text-gold">♫</button>
            <button id="fav-btn" onclick="toggleFavorite()" class="bg-black/50 p-3 rounded-full border border-white/20 hover:border-red-500 text-white hover:text-red-500">❤</button>
            <button onclick="closeDetail()" class="bg-black/50 p-3 rounded-full border border-white/20 hover:border-gold text-white hover:text-gold">X</button>
        </div>
        <div class="relative min-h-screen pb-20">
            <div class="h-[65vh] w-full relative">
                <img id="detail-img" src="" class="w-full h-full object-cover object-top grayscale" alt="">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            </div>
            <div class="px-6 -mt-32 relative z-10 max-w-2xl mx-auto">
                <h2 id="detail-name" class="text-5xl font-black text-white uppercase tracking-tighter mb-2 drop-shadow-2xl"></h2>
                <p id="detail-dates" class="text-gold text-sm tracking-[0.3em] mb-8 opacity-90 font-mono"></p>
                <div class="border-l-4 border-gold pl-6 mb-10 py-1"><h3 id="detail-headline" class="text-2xl font-bold text-white mb-3 italic"></h3><p id="detail-quote" class="text-gray-400 italic text-lg leading-relaxed"></p></div>
                <div class="prose prose-invert prose-lg mb-12"><p id="detail-bio" class="text-gray-300 leading-loose font-light text-lg text-left"></p></div>
                
                <!-- VIDEO CONTAINER (GATEKEEPER APPLIED HERE) -->
                <div id="video-container" class="hidden mb-16">
                    <h3 class="text-xl font-bold text-white mb-4">OFFICIAL TRAILER</h3>
                    <div id="video-wrapper" class="aspect-video w-full rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black relative">
                        <!-- Content injected via JS -->
                    </div>
                </div>

                <div class="mb-16 flex flex-col items-center">
                    <button id="candle-btn" onclick="toggleCandle()" class="group flex flex-col items-center outline-none">
                        <div id="candle-circle" class="relative w-20 h-20 rounded-full bg-white/5 border border-white/10 flex items-center justify-center transition-all duration-500">
                            <div id="candle-glow" class="absolute inset-0 rounded-full bg-gold blur-xl opacity-0 transition-opacity duration-700"></div>
                            <svg id="candle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="relative z-10 w-8 h-8 text-gray-500 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z" /></svg>
                        </div>
                        <span id="candle-text" class="mt-4 text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase group-hover:text-white transition-colors">Light a Candle</span>
                        <span id="candle-count" class="mt-1 text-gold font-mono text-sm opacity-60">0</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 w-full z-40 bg-black/90 backdrop-blur-xl border-t border-white/5 px-6 py-4 flex justify-around items-center pb-8 safe-area-pb">
        <button onclick="showHome()" id="nav-home" class="flex flex-col items-center space-y-1 text-gold"><span class="text-[9px] font-bold uppercase">Home</span></button>
        <button onclick="toggleSearch()" id="nav-search" class="flex flex-col items-center space-y-1 text-gray-500"><span class="text-[9px] font-bold uppercase">Search</span></button>
        <button onclick="showProfile()" id="nav-profile" class="flex flex-col items-center space-y-1 text-gray-500"><span class="text-[9px] font-bold uppercase">Profile</span></button>
    </nav>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const supabaseUrl = 'https://aahsaqygohmykhagbihk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E';
        
        // Supabase wird jetzt korrekt gefunden, da das Script im Head geladen wurde.
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 1. PERMISSIONS SYSTEM (Feature Gates) ---
        const Permissions = {
            caps: ['read_bios', 'search'], 
            
            // SIMULATION: Ändere 'FREE' zu 'SUPPORTER' oder 'LEGACY+' um es zu testen!
            currentPlan: 'FREE', 

            async init() {
                // In einer echten App: Hole User aus DB. Hier Simulieren wir es.
                console.log("Current Plan:", this.currentPlan);
                
                if (this.currentPlan === 'SUPPORTER') {
                    this.caps.push('view_trailers', 'priority_suggest');
                } else if (this.currentPlan === 'LEGACY+') {
                    this.caps.push('view_trailers', 'priority_suggest', 'enable_push');
                }
                
                // Update UI Label
                const label = document.getElementById('plan-label');
                if(label) label.innerText = `${this.currentPlan} MEMBER`;
            },

            can(feature) { return this.caps.includes(feature); }
        };

        // --- DATA ---
        let allLegendsData = [];
        let club27Data = [];
        let currentDetailId = null;

        // --- APP LOGIC ---

        async function loadLegends() {
            await Permissions.init(); // Berechtigungen laden
            
            let { data: legends, error } = await db.from('legends').select('*').order('name');
            if (!error) { 
                allLegendsData = legends; 
                setHero(legends); 
                renderGrid(legends); 
                loadUserData(); 
            }
        }

        async function loadClub27Data() {
            let { data, error } = await db.from('club27').select('*');
            if (data) {
                club27Data = data.map(item => ({
                    id: item.id, name: item.name, dates: item.lifespan, category: 'CLUB 27',
                    image_url: item.image_url, bio: item.description, candles: 0 
                }));
            }
        }

        // --- GATE: PUSH NOTIFICATIONS (Legacy+) ---
        function enablePush() {
            if (!Permissions.can('enable_push')) {
                showVelvetRopeToast("Requires Legacy+ Plan");
                return;
            }

            if (!("Notification" in window)) return;
            Notification.requestPermission().then(permission => {
                if (permission === "granted") { 
                    new Notification("Remembered", { body: "Notifications active!" }); 
                    document.getElementById('push-btn').classList.add('text-gold');
                }
            });
        }

        // --- GATE: DETAIL & TRAILER (Supporter) ---
        function openDetail(id) {
            const l = allLegendsData.find(x => x.id === id) || club27Data.find(x => x.id === id);
            if(!l) return;
            currentDetailId = id;

            // Basic Content (Free)
            document.getElementById('detail-img').src = l.image_url;
            document.getElementById('detail-name').innerText = l.name;
            document.getElementById('detail-dates').innerText = getDetailDate(l.dates, l.death_date);
            document.getElementById('detail-headline').innerText = l.headline || "";
            document.getElementById('detail-quote').innerText = l.quote || "";
            document.getElementById('detail-bio').innerText = l.bio || "";

            // Video Logic (Locked/Unlocked)
            const v = document.getElementById('video-container');
            const wrapper = document.getElementById('video-wrapper');
            
            if(l.trailer_url) {
                v.classList.remove('hidden');
                
                if (Permissions.can('view_trailers')) {
                    // UNLOCKED: Show Video
                    let i = l.trailer_url.split('v=')[1]?.split('&')[0];
                    if(i) wrapper.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${i}" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    // LOCKED: Show Velvet Rope UI
                    let i = l.trailer_url.split('v=')[1]?.split('&')[0];
                    const thumb = i ? `https://img.youtube.com/vi/${i}/hqdefault.jpg` : l.image_url;
                    
                    wrapper.innerHTML = `
                        <img src="${thumb}" class="w-full h-full object-cover gate-blur opacity-50">
                        <div class="gate-overlay">
                            <div class="gate-badge">🔒 SUPPORTER ONLY</div>
                            <p class="text-white text-xs font-light tracking-widest uppercase">Video Vault Locked</p>
                        </div>
                    `;
                    // Klick-Handler für Upsell-Toast
                    wrapper.onclick = () => showVelvetRopeToast("Become a Supporter to watch trailers");
                }
            } else {
                v.classList.add('hidden');
            }

            // Music (Free)
            const m = document.getElementById('music-btn');
            if(l.music_url) { m.classList.remove('hidden'); m.onclick=()=>window.open(l.music_url,'_blank'); } 
            else m.classList.add('hidden');
            
            // Candles
            const countLabel = document.getElementById('candle-count');
            countLabel.innerText = (l.candles || 0).toLocaleString();
            
            document.getElementById('detail-overlay').classList.remove('hidden');
        }

        function closeDetail() { 
            document.getElementById('detail-overlay').classList.add('hidden'); 
            document.getElementById('video-wrapper').innerHTML = ""; // Stop Video
        }

        // --- UTILS ---
        function showVelvetRopeToast(msg) {
            const div = document.createElement('div');
            div.className = "fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-900 border border-gold/30 text-gold px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl z-[70] animate-in fade-in slide-in-from-bottom-4";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function getDetailDate(d1, d2) { return d2 ? `${d1 || ''} – ${d2}` : (d1 || ''); }
        
        // Navigation & Grid rendering (Standard logic)
        function hideAllViews() { 
            ['home-view','profile-view','favorites-view','candles-view','settings-view'].forEach(id => document.getElementById(id).classList.add('hidden')); 
        }
        function showHome() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.remove('hidden'); document.getElementById('club27-header').classList.add('hidden'); renderGrid(allLegendsData); updateNavColors('home'); }
        async function showClub27() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); document.getElementById('hero-section').classList.add('hidden'); document.getElementById('club27-header').classList.remove('hidden'); if(!club27Data.length) await loadClub27Data(); renderGrid(club27Data); updateNavColors('home'); }
        function showProfile() { hideAllViews(); document.getElementById('profile-view').classList.remove('hidden'); updateNavColors('profile'); }
        function showSettings() { hideAllViews(); document.getElementById('settings-view').classList.remove('hidden'); }
        function showFavoritesView() { hideAllViews(); document.getElementById('favorites-view').classList.remove('hidden'); renderSubsetGrid('favorites-grid', getFavorites()); }
        function showCandlesView() { hideAllViews(); document.getElementById('candles-view').classList.remove('hidden'); renderSubsetGrid('candles-grid', getMyCandles()); }
        
        function renderGrid(data) {
            const g = document.getElementById('legends-grid'); g.innerHTML = '';
            data.forEach(l => g.innerHTML += createCard(l));
        }
        function renderSubsetGrid(elId, ids) {
            const g = document.getElementById(elId); g.innerHTML = '';
            const subset = allLegendsData.filter(x => ids.includes(x.id));
            if(subset.length) subset.forEach(l => g.innerHTML += createCard(l));
            else g.innerHTML = '<p class="text-gray-500 col-span-2">Nothing here yet.</p>';
        }

        function createCard(l) {
            const isClub27 = l.category === 'CLUB 27';
            const imgClass = isClub27 ? "opacity-80 grayscale group-hover:grayscale-0" : "grayscale group-hover:grayscale-0";
            return `<div onclick="openDetail('${l.id}')" class="relative group aspect-[3/4] bg-gray-900 rounded-xl overflow-hidden border border-white/5 hover:border-gold/30 transition-all duration-500 cursor-pointer">
                <img src="${l.image_url}" class="w-full h-full object-cover transition-all duration-700 ${imgClass}">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-90"></div>
                <div class="absolute bottom-0 left-0 p-4 w-full">
                    <h2 class="text-white font-bold text-lg mb-1 group-hover:text-gold transition-colors">${l.name}</h2>
                    <p class="text-gray-500 text-[10px] uppercase tracking-wider">${l.category || 'LEGEND'}</p>
                </div>
            </div>`;
        }

        function setHero(data) {
            const c = document.getElementById('hero-container');
            if(data.length && c) {
                const r = data[Math.floor(Math.random() * data.length)];
                c.innerHTML = `<div onclick="openDetail('${r.id}')" class="w-full h-full relative"><img src="${r.image_url}" class="w-full h-full object-cover object-top grayscale"><div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div><div class="absolute bottom-8 left-8"><span class="bg-gold text-black text-[10px] font-bold px-2 py-1 uppercase">Highlight</span><h2 class="text-4xl font-bold text-white mt-2">${r.name}</h2></div></div>`;
            }
        }

        // Search
        function toggleSearch() { const s=document.getElementById('search-bar-container'); if(s.classList.contains('hidden')) { s.classList.remove('hidden'); document.getElementById('search-input').focus(); } else closeSearch(); }
        function closeSearch() { document.getElementById('search-bar-container').classList.add('hidden'); renderGrid(allLegendsData); }
        function filterLegends() { const q=document.getElementById('search-input').value.toLowerCase(); renderGrid(allLegendsData.filter(l=>l.name.toLowerCase().includes(q))); }
        function filterCategory(cat) { showHome(); renderGrid(allLegendsData.filter(l => l.category && l.category.includes(cat))); }

        // LocalStorage Helpers
        function loadUserData() { const n = localStorage.getItem('user_name'); if(n) { document.getElementById('profile-name').innerText=n; document.getElementById('profile-avatar').innerText=n[0]; } updateProfileStats(); }
        function saveSettings() { const n = document.getElementById('settings-name-input').value; if(n) { localStorage.setItem('user_name', n); loadUserData(); showProfile(); } }
        function resetApp() { if(confirm("Reset?")) { localStorage.clear(); location.reload(); } }
        function getFavorites() { return JSON.parse(localStorage.getItem('my_favorites') || '[]'); }
        function getMyCandles() { return JSON.parse(localStorage.getItem('my_candles') || '[]'); }
        function toggleFavorite() { if(!currentDetailId)return; let f=getFavorites(); if(f.includes(currentDetailId)) f=f.filter(i=>i!==currentDetailId); else f.push(currentDetailId); localStorage.setItem('my_favorites', JSON.stringify(f)); updateProfileStats(); }
        async function toggleCandle() {
            // Candle logic simplified for this demo
            const circle = document.getElementById('candle-circle');
            const text = document.getElementById('candle-text');
            if(text.innerText === "CANDLE LIT") return;
            circle.classList.add('bg-gold/10', 'border-gold', 'shadow-[0_0_20px_rgba(234,179,8,0.3)]');
            text.innerText = "CANDLE LIT"; text.classList.add('text-gold');
            let c = getMyCandles(); if(!c.includes(currentDetailId)) { c.push(currentDetailId); localStorage.setItem('my_candles', JSON.stringify(c)); }
            updateProfileStats();
            // DB Update would happen here
        }
        function updateProfileStats() { document.getElementById('profile-fav-count').innerText=getFavorites().length; document.getElementById('profile-candle-count').innerText=getMyCandles().length; }
        function updateNavColors(active) { 
            const def="text-gray-500 hover:text-white"; const act="text-gold";
            ['nav-home','nav-search','nav-profile'].forEach(id=>document.getElementById(id).className=`flex flex-col items-center space-y-1 ${def}`);
            if(active==='home') document.getElementById('nav-home').className=`flex flex-col items-center space-y-1 ${act}`;
            if(active==='profile') document.getElementById('nav-profile').className=`flex flex-col items-center space-y-1 ${act}`;
        }
        function openSuggestModal() { document.getElementById('suggest-overlay').classList.remove('hidden'); }
        function closeSuggest() { document.getElementById('suggest-overlay').classList.add('hidden'); }

        // START
        loadLegends();

    </script>
</body>
</html>
