<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remembered - Legends App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .text-gold { color: #EAB308; }
        .bg-gold { background-color: #EAB308; }
        .border-gold { border-color: #EAB308; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .pulse-gold-slow { animation: pulseGold 3s infinite; }
        @keyframes pulseGold { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.2); } 50% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="min-h-screen pb-24 selection:bg-gold selection:text-black">

    <header class="fixed top-0 w-full z-40 bg-black/80 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center transition-all duration-300" id="main-header">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-gradient-to-br from-white/20 to-transparent rounded border border-white/10 flex items-center justify-center">
                <span class="text-xs font-bold text-white">R</span>
            </div>
            <h1 class="text-sm font-bold tracking-[0.2em] text-white uppercase opacity-90">Remembered</h1>
        </div>
        <div onclick="showProfile()" class="relative w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10 cursor-pointer hover:border-gold/50 transition">
            <span id="header-avatar" class="text-xs font-bold text-gold">ME</span>
            <div id="header-notif-dot" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-black animate-ping"></div>
            <div id="header-notif-dot-static" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-black"></div>
        </div>
    </header>

    <div id="search-bar-container" class="hidden fixed top-0 w-full z-50 bg-black/95 backdrop-blur-xl border-b border-gold/20 px-4 py-3 shadow-2xl">
        <div class="relative max-w-7xl mx-auto flex items-center">
            <input type="text" id="search-input" onkeyup="filterLegends()" placeholder="Suche..." class="w-full bg-white/10 border border-white/10 rounded-full py-3 pl-4 pr-4 text-white placeholder-gray-400 focus:outline-none focus:border-gold transition-all">
            <button onclick="closeSearch()" class="ml-4 text-sm text-gray-400">Abbrechen</button>
        </div>
    </div>

    <main id="home-view" class="pt-24 px-4 max-w-7xl mx-auto fade-in">
        <div id="hero-section" class="mb-12 transition-all duration-500">
            <h2 class="text-2xl font-bold text-white mb-1 tracking-tight">Für dich – Heute</h2>
            <p class="text-gray-400 text-sm mb-6 font-medium">Erinnere dich an Ikonen</p>
            <div id="hero-container" class="relative w-full h-[500px] md:h-[600px] rounded-3xl overflow-hidden bg-gray-900 border border-white/10 shadow-2xl cursor-pointer">
                <div class="w-full h-full animate-pulse bg-gray-900 flex items-center justify-center"><p class="text-gold opacity-50">Lade...</p></div>
            </div>
        </div>
        <div id="search-results-header" class="hidden mb-6"><h2 class="text-xl font-bold text-white">Ergebnisse</h2></div>
        <div id="legends-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
    </main>

    <main id="favorites-view" class="hidden pt-24 px-4 max-w-7xl mx-auto fade-in h-screen">
        <div class="mb-8 flex items-center space-x-4">
            <button onclick="showProfile()" class="p-2 bg-white/5 rounded-full hover:bg-white/10"><svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
            <h2 class="text-2xl font-bold text-white">Deine Favoriten</h2>
        </div>
        <div id="favorites-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-20"></div>
    </main>

    <main id="settings-view" class="hidden pt-24 px-6 max-w-lg mx-auto fade-in h-screen">
        <div class="mb-8 flex items-center space-x-4">
            <button onclick="showProfile()" class="p-2 bg-white/5 rounded-full hover:bg-white/10"><svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
            <h2 class="text-2xl font-bold text-white">Einstellungen</h2>
        </div>
        <div class="space-y-6">
            <input type="text" id="settings-name-input" placeholder="Dein Name" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white">
            <button id="push-btn" onclick="enablePush()" class="w-full bg-white/5 border border-white/10 text-gray-300 font-bold py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-white/10 hover:text-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
                <span id="push-btn-text">Push-Nachrichten aktivieren</span>
            </button>
            <button onclick="saveSettings()" class="w-full bg-gold text-black font-bold py-4 rounded-xl">SPEICHERN</button>
            <button onclick="resetApp()" class="w-full text-red-500 py-3 text-sm">Alles löschen</button>
        </div>
    </main>

    <section id="profile-view" class="hidden pt-28 px-6 max-w-lg mx-auto fade-in h-screen">
        <div class="flex flex-col items-center mb-10">
            <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-gold to-yellow-600 p-1 mb-4 shadow-lg shadow-gold/20">
                <div class="w-full h-full rounded-full bg-black flex items-center justify-center overflow-hidden">

            </div>
            <h2 id="profile-name" class="text-2xl font-bold text-white">Mein Profil</h2>
            <p class="text-gold text-xs tracking-[0.2em] uppercase mt-1 opacity-80">Mitglied seit 2026</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center">
                <p id="profile-candle-count" class="text-2xl font-bold text-white">12</p><p class="text-gray-500 text-[10px] uppercase mt-1">Kerzen</p>
            </div>
            <div onclick="showFavoritesView()" class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center cursor-pointer group">
                <p id="profile-fav-count" class="text-2xl font-bold text-white group-hover:text-gold">0</p><p class="text-gray-500 text-[10px] uppercase mt-1 group-hover:text-white">Favoriten</p>
            </div>
        </div>
        <div class="space-y-3">
            <button onclick="showSettings()" class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition"><span class="text-sm font-medium text-gray-300">Account & Push</span><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
            <button id="notif-btn" class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition">
                <div class="flex items-center"><span id="notif-text" class="text-sm font-medium text-gray-300">Keine neuen Nachrichten</span></div>
                <div id="notif-badge" class="hidden w-2 h-2 bg-red-500 rounded-full"></div>
            </button>
            <button onclick="resetApp()" class="w-full flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 mt-8"><span class="text-sm font-medium text-red-500">Ausloggen</span></button>
        </div>
    </section>

    <a href="https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M" target="_blank" id="radio-fab" class="fixed bottom-24 right-4 z-30 bg-black/80 backdrop-blur border border-gold/50 text-gold p-3 rounded-full shadow-lg shadow-gold/10 hover:bg-gold hover:text-black hover:scale-105 transition-all duration-300 group pulse-gold-slow flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-2v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-2" /></svg>
    </a>

    <nav class="fixed bottom-0 w-full z-40 bg-black/90 backdrop-blur-xl border-t border-white/5 px-6 py-4 flex justify-around items-center pb-8 safe-area-pb">
        <button onclick="showHome()" id="nav-home" class="flex flex-col items-center space-y-1 text-gold"><span class="text-[9px] font-bold uppercase">Home</span></button>
        <button onclick="toggleSearch()" id="nav-search" class="flex flex-col items-center space-y-1 text-gray-500"><span class="text-[9px] font-bold uppercase">Suche</span></button>
        <button onclick="showProfile()" id="nav-profile" class="flex flex-col items-center space-y-1 text-gray-500"><span class="text-[9px] font-bold uppercase">Profil</span></button>
    </nav>

    <div id="detail-overlay" class="hidden fixed inset-0 z-50 bg-black text-white overflow-y-auto animate-in fade-in duration-300">
        <div class="fixed top-6 right-6 z-[60] flex space-x-3">
            <button id="music-btn" class="hidden bg-black/50 p-3 rounded-full border border-white/20 hover:border-gold text-white hover:text-gold"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-2v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-2"/></svg></button>
            <button id="fav-btn" onclick="toggleFavorite()" class="bg-black/50 p-3 rounded-full border border-white/20 hover:border-red-500 text-white hover:text-red-500"><svg id="fav-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg></button>
            <button onclick="closeDetail()" class="bg-black/50 p-3 rounded-full border border-white/20 hover:border-gold text-white hover:text-gold"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <div class="relative min-h-screen pb-20">
            <div class="h-[65vh] w-full relative">
                <img id="detail-img" src="" class="w-full h-full object-cover object-top grayscale" alt="">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            </div>
            <div class="px-6 -mt-32 relative z-10 max-w-2xl mx-auto">
                <h2 id="detail-name" class="text-5xl font-black text-white uppercase tracking-tighter mb-2 drop-shadow-2xl"></h2>
                <p id="detail-dates" class="text-gold text-sm tracking-[0.3em] mb-8 opacity-90 font-mono"></p>
                <div class="border-l-4 border-gold pl-6 mb-10 py-1"><h3 id="detail-headline" class="text-2xl font-bold text-white mb-3 italic"></h3><p id="detail-quote" class="text-gray-400 italic text-lg leading-relaxed"></p></div>
                <div class="prose prose-invert prose-lg mb-12"><p id="detail-bio" class="text-gray-300 leading-loose font-light text-lg text-left"></p></div>
                <div id="video-container" class="hidden mb-16"><h3 class="text-xl font-bold text-white mb-4">OFFICIAL TRAILER</h3><div class="aspect-video w-full rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black"><iframe id="video-frame" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div></div>
                <div class="mb-16 flex flex-col items-center"><button id="candle-btn" onclick="toggleCandle()" class="group flex flex-col items-center outline-none"><div id="candle-circle" class="relative w-20 h-20 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:border-gold/50 transition-all duration-500"><div id="candle-glow" class="absolute inset-0 rounded-full bg-gold blur-xl opacity-0 transition-opacity duration-700"></div><svg id="candle-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="relative z-10 w-8 h-8 text-gray-500 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.048 8.287 8.287 0 009 9.6a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 00.495-7.467 5.99 5.99 0 00-1.925 3.546 5.974 5.974 0 01-2.133-1A3.75 3.75 0 0012 18z" /></svg></div><span id="candle-text" class="mt-4 text-[10px] font-bold tracking-[0.2em] text-gray-500 uppercase group-hover:text-white transition-colors">Zünde eine Kerze an</span><span id="candle-count" class="mt-1 text-gold font-mono text-sm opacity-60">0</span></button></div>
                <div class="mb-20 text-center"><button onclick="closeDetail()" class="px-8 py-3 rounded-full border border-white/20 hover:border-gold text-white text-xs font-bold tracking-[0.2em] uppercase transition-colors">Zurück zur Gallery</button></div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://aahsaqygohmykhagbihk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhaHNhcXlnb2hteWtoYWdiaWhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwODQzMDcsImV4cCI6MjA4MjY2MDMwN30.yRGsxsWC9EGO5rR1cy4_9Clt6FvJ05cqRo9qHlVyE-E';
        const db = supabase.createClient(supabaseUrl, supabaseKey);
        let allLegendsData = [];
        let currentDetailId = null;

        // PUSH
        function enablePush() {
            if (!("Notification" in window)) { alert("Dein Browser unterstützt keine Push-Nachrichten."); return; }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") { document.getElementById('push-btn-text').innerText = "Push ist Aktiviert ✅"; new Notification("Remembered", { body: "Push-Nachrichten aktiviert! Du wirst informiert.", icon: "https://placehold.co/100x100/gold/black?text=R" }); }
                else { alert("Push-Nachrichten wurden blockiert."); }
            });
        }
        function updatePushBtnState() { if ("Notification" in window && Notification.permission === "granted") { document.getElementById('push-btn-text').innerText = "Push ist Aktiviert ✅"; document.getElementById('push-btn').classList.add('text-gold', 'border-gold'); } }

        // CHECK ANNIVERSARY
        function checkAnniversaries() {
            const today = new Date(); const currentMonth = today.getMonth() + 1; const currentDay = today.getDate(); const favIds = getFavorites(); let hit = null; let yearsGone = 0;
            allLegendsData.forEach(legend => {
                if (legend.death_date && favIds.includes(legend.id)) {
                    let dDay, dMonth, dYear;
                    if (legend.death_date.includes('.')) { const p = legend.death_date.split('.'); dDay = parseInt(p[0]); dMonth = parseInt(p[1]); dYear = parseInt(p[2]); } 
                    else { const p = legend.death_date.split('-'); dYear = parseInt(p[0]); dMonth = parseInt(p[1]); dDay = parseInt(p[2]); }
                    if (dMonth === currentMonth && dDay === currentDay) { hit = legend; yearsGone = today.getFullYear() - dYear; }
                }
            });
            const btn=document.getElementById('notif-btn'); const txt=document.getElementById('notif-text'); const bdg=document.getElementById('notif-badge'); const d1=document.getElementById('header-notif-dot'); const d2=document.getElementById('header-notif-dot-static');
            if (hit) {
                btn.onclick = function() { openDetail(hit.id); }; btn.classList.remove('bg-white/5'); btn.classList.add('bg-red-500/10', 'border-red-500/50', 'pulse-red');
                txt.innerHTML = `<span class="text-red-400 font-bold">🕊️ ${hit.name}: ${yearsGone}. Todestag</span>`;
                bdg.classList.remove('hidden'); d1.classList.remove('hidden'); d2.classList.remove('hidden');
                if ("Notification" in window && Notification.permission === "granted" && !sessionStorage.getItem('notified_' + hit.id)) {
                    new Notification(`🕊️ Gedenke ${hit.name}`, { body: `Heute ist der ${yearsGone}. Todestag.`, icon: hit.image_url });
                    sessionStorage.setItem('notified_' + hit.id, 'true');
                }
            } else { btn.onclick=null; txt.innerText="Keine neuen Nachrichten"; btn.classList.remove('bg-red-500/10','border-red-500/50','pulse-red'); btn.classList.add('bg-white/5'); bdg.classList.add('hidden'); d1.classList.add('hidden'); d2.classList.add('hidden'); }
        }

        async function loadLegends() { let { data: legends, error } = await db.from('legends').select('*').order('name'); if (!error) { allLegendsData = legends; setHero(legends); renderGrid(legends); loadUserData(); checkAnniversaries(); } }

        // UTILS
        function loadUserData() { const n = localStorage.getItem('user_name'); if (n) { document.getElementById('profile-name').innerText=n; document.getElementById('profile-avatar').innerText=n.charAt(0).toUpperCase(); document.getElementById('header-avatar').innerText=n.charAt(0).toUpperCase(); document.getElementById('settings-name-input').value=n; } updatePushBtnState(); updateProfileStats(); }
        function saveSettings() { const n = document.getElementById('settings-name-input').value.trim(); if (n) { localStorage.setItem('user_name', n); loadUserData(); showProfile(); } }
        function resetApp() { if(confirm("Alles löschen?")) { localStorage.clear(); location.reload(); } }
        function getFavorites() { return JSON.parse(localStorage.getItem('my_favorites') || '[]'); }
        function saveFavorites(arr) { localStorage.setItem('my_favorites', JSON.stringify(arr)); updateProfileStats(); checkAnniversaries(); }
        function updateProfileStats() { document.getElementById('profile-fav-count').innerText = getFavorites().length; }
        function hideAllViews() { document.getElementById('home-view').classList.add('hidden'); document.getElementById('profile-view').classList.add('hidden'); document.getElementById('favorites-view').classList.add('hidden'); document.getElementById('settings-view').classList.add('hidden'); }
        function showHome() { hideAllViews(); document.getElementById('home-view').classList.remove('hidden'); updateNavColors('home'); closeSearch(); }
        function showProfile() { hideAllViews(); document.getElementById('profile-view').classList.remove('hidden'); updateNavColors('profile'); closeSearch(); }
        function showFavoritesView() { hideAllViews(); document.getElementById('favorites-view').classList.remove('hidden'); const g = document.getElementById('favorites-grid'); g.innerHTML = ''; const f = getFavorites(); const l = allLegendsData.filter(x => f.includes(x.id)); if(l.length) l.forEach(x => g.innerHTML += createCard(x)); else g.innerHTML = '<p class="col-span-2 text-gray-500">Keine Favoriten.</p>'; }
        function showSettings() { hideAllViews(); document.getElementById('settings-view').classList.remove('hidden'); }
        function updateNavColors(active) { const b="flex flex-col items-center space-y-1 text-gray-500 hover:text-white group transition-all duration-300 transform active:scale-95"; const a="flex flex-col items-center space-y-1 text-gold group transition-all duration-300 transform active:scale-95"; document.getElementById('nav-home').className=b; document.getElementById('nav-search').className=b; document.getElementById('nav-profile').className=b; if(active==='home') document.getElementById('nav-home').className=a; if(active==='search') document.getElementById('nav-search').className=a; if(active==='profile') document.getElementById('nav-profile').className=a; }
        
        // --- HELPER: NUR JAHRESZAHLEN (für Karte) ---
        function getCardDate(datesStr, deathDateStr) {
            if (!datesStr) return '';
            let birthYear = datesStr.substr(-4); 
            const match = datesStr.match(/(\d{4})/);
            if (match) birthYear = match[0];
            let deathYear = '';
            if (deathDateStr) { deathYear = deathDateStr.split('-')[0]; }
            if(deathYear) return `${birthYear} – ${deathYear}`;
            return datesStr; 
        }

        // --- HELPER: VOLLES DATUM (für Detail) ---
        function getDetailDate(datesStr, deathDateStr) {
            if (!datesStr) return '';
            if (!deathDateStr) return datesStr;
            let birthPart = datesStr.split('–')[0].trim();
            if(datesStr.includes('-')) birthPart = datesStr.split('-')[0].trim();
            let niceDeathDate = deathDateStr;
            if (deathDateStr.includes('-')) {
                const parts = deathDateStr.split('-'); 
                if(parts.length === 3) { niceDeathDate = `${parts[2]}.${parts[1]}.${parts[0]}`; }
            }
            return `${birthPart} – ${niceDeathDate}`;
        }

        function createCard(l) { 
            const i = l.image_url || 'https://placehold.co/600x800'; 
            const displayDate = getCardDate(l.dates, l.death_date); 
            return `<div onclick="openDetail('${l.id}')" class="relative group aspect-[3/4] bg-gray-900 rounded-xl overflow-hidden border border-white/5 hover:border-gold/30 transition-all duration-500">
                <img src="${i}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 opacity-80 group-hover:opacity-100 transition-all duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/10 to-transparent opacity-90"></div>
                <div class="absolute bottom-0 left-0 p-4 w-full">
                    <h2 class="text-white font-bold text-lg leading-tight mb-1 group-hover:text-gold transition-colors">${l.name}</h2>
                    <p class="text-gold text-[10px] font-mono leading-tight mb-1.5 opacity-90 break-words">${displayDate}</p>
                    <p class="text-gray-400 text-[9px] font-bold tracking-[0.2em] uppercase group-hover:text-white transition-colors">${l.category || 'LEGEND'}</p>
                </div>
            </div>`; 
        }

        function renderGrid(legends) { 
            const g=document.getElementById('legends-grid'); g.innerHTML=''; 
            legends.forEach(l => g.innerHTML+=createCard(l));
            g.innerHTML += `
            <div onclick="suggestLegend()" class="relative group aspect-[3/4] bg-white/5 rounded-xl border-2 border-dashed border-white/20 hover:border-gold flex flex-col items-center justify-center cursor-pointer transition-all hover:bg-white/10">
                <div class="w-12 h-12 rounded-full bg-gold/20 flex items-center justify-center mb-4 group-hover:bg-gold text-gold group-hover:text-black transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                </div>
                <p class="text-white font-bold text-sm text-center px-4">Jemanden vergessen?</p>
                <p class="text-gray-400 text-xs text-center mt-1">Schlag eine Ikone vor</p>
            </div>`;
        }
        
        function suggestLegend() {
            const email = "admin@rememberedapp.io"; 
            const subject = "Vorschlag für Remembered";
            const body = "Name der Legende:%0AWarum:%0A";
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }

        function setHero(legends) { const c=document.getElementById('hero-container'); if(legends.length && c) { const r=legends[Math.floor(Math.random() * legends.length)]; c.innerHTML=`<div onclick="openDetail('${r.id}')" class="relative w-full h-full"><img src="${r.image_url}" class="absolute inset-0 w-full h-full object-cover object-top grayscale"><div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div><div class="absolute bottom-0 left-0 p-8"><span class="bg-gold text-black text-[10px] font-bold px-2 py-1 uppercase">Highlight</span><h2 class="text-4xl font-black mt-2 text-white">${r.name}</h2></div></div>`; } }
        function toggleSearch() { const s=document.getElementById('search-bar-container'); if(s.classList.contains('hidden')) { s.classList.remove('hidden'); setTimeout(()=>document.getElementById('search-input').focus(),100); } else closeSearch(); }
        function closeSearch() { document.getElementById('search-bar-container').classList.add('hidden'); document.getElementById('search-input').value=''; renderGrid(allLegendsData); }
        function filterLegends() { const q=document.getElementById('search-input').value.toLowerCase(); renderGrid(allLegendsData.filter(l=>l.name.toLowerCase().includes(q))); }
        
        function openDetail(id) { 
            const l=allLegendsData.find(x=>x.id===id); if(!l)return; 
            currentDetailId=id; 
            document.getElementById('detail-img').src=l.image_url; 
            document.getElementById('detail-name').innerText=l.name; 
            document.getElementById('detail-dates').innerText = getDetailDate(l.dates, l.death_date);
            document.getElementById('detail-headline').innerText=l.headline||""; 
            document.getElementById('detail-quote').innerText=l.quote||""; 
            document.getElementById('detail-bio').innerText=l.bio||""; 
            
            const v=document.getElementById('video-container'); const f=document.getElementById('video-frame'); 
            if(l.trailer_url) { try { let i=l.trailer_url.split('v=')[1]; if(i) { i=i.split('&')[0]; f.src=`https://www.youtube-nocookie.com/embed/${i}`; v.classList.remove('hidden'); } } catch(e){ v.classList.add('hidden'); } } else { v.classList.add('hidden'); f.src=""; } 
            const m=document.getElementById('music-btn'); if(l.music_url) { m.classList.remove('hidden'); m.onclick=()=>window.open(l.music_url,'_blank'); } else m.classList.add('hidden'); 
            
            updateFavBtnState(id);
            
            // UI Reset
            const icon = document.getElementById('candle-icon'); const circle = document.getElementById('candle-circle'); const glow = document.getElementById('candle-glow'); const text = document.getElementById('candle-text'); const countLabel = document.getElementById('candle-count');
            icon.setAttribute('fill', 'none'); icon.setAttribute('stroke', 'currentColor'); icon.classList.add('text-gray-500'); icon.classList.remove('text-black', 'fill-black'); icon.setAttribute('stroke', 'currentColor');
            circle.classList.remove('bg-gold/10', 'border-gold', 'shadow-[0_0_40px_rgba(234,179,8,0.3)]'); 
            glow.classList.remove('opacity-40'); glow.classList.add('opacity-0'); 
            text.innerText = "ZÜNDE EINE KERZE AN"; text.classList.remove('text-gold'); 
            
            // Zahl laden
            const realCount = l.candles || 0; 
            countLabel.innerText = realCount.toLocaleString('de-DE'); 
            if(realCount > 0) { countLabel.classList.add('opacity-100', 'font-bold'); countLabel.classList.remove('opacity-60'); } else { countLabel.classList.add('opacity-60'); countLabel.classList.remove('opacity-100', 'font-bold'); }

            document.getElementById('detail-overlay').classList.remove('hidden'); 
            document.getElementById('radio-fab').classList.add('hidden'); // Radio verstecken
        }

        function closeDetail() { 
            document.getElementById('detail-overlay').classList.add('hidden'); 
            document.getElementById('video-frame').src=""; 
            document.getElementById('radio-fab').classList.remove('hidden'); // Radio zeigen
        }
        function toggleFavorite() { if(!currentDetailId)return; let f=getFavorites(); if(f.includes(currentDetailId)) f=f.filter(i=>i!==currentDetailId); else f.push(currentDetailId); saveFavorites(f); updateFavBtnState(currentDetailId); }
        function updateFavBtnState(id) { const f=getFavorites(); const i=document.getElementById('fav-icon'); if(f.includes(id)) { i.setAttribute('fill','currentColor'); i.classList.add('text-red-500'); } else { i.setAttribute('fill','none'); i.classList.remove('text-red-500'); } }
        
        async function toggleCandle() { 
            const text = document.getElementById('candle-text');
            if(text.innerText === "KERZE ENTZÜNDET") return;
            const icon = document.getElementById('candle-icon'); const circle = document.getElementById('candle-circle'); const glow = document.getElementById('candle-glow'); const countLabel = document.getElementById('candle-count'); 
            icon.classList.remove('text-gray-500'); icon.setAttribute('stroke', '#EAB308'); icon.setAttribute('fill', '#EAB308'); circle.classList.add('bg-gold/10', 'border-gold', 'shadow-[0_0_40px_rgba(234,179,8,0.3)]'); glow.classList.remove('opacity-0'); glow.classList.add('opacity-40'); text.innerText = "KERZE ENTZÜNDET"; text.classList.add('text-gold'); 
            let currentVal = parseInt(countLabel.innerText.replace(/\./g, '')) || 0;
            const newVal = currentVal + 1;
            countLabel.innerText = newVal.toLocaleString('de-DE'); 
            countLabel.classList.remove('opacity-60'); countLabel.classList.add('opacity-100', 'font-bold'); 
            if(currentDetailId) {
                const legend = allLegendsData.find(x => x.id === currentDetailId);
                if(legend) {
                    legend.candles = newVal; 
                    await db.from('legends').update({ candles: newVal }).eq('id', currentDetailId);
                }
            }
        }

        loadLegends();
    </script>
</body>
</html>
