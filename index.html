<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Remembered - The AI Legacy Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        html, body { height: 100%; overflow: hidden; }

        /* Wir bauen die Animation manuell, damit sie IMMER geht */
        @keyframes custom-pulse {
            0% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }
        
        .status-dot {
            animation: custom-pulse 2s infinite ease-in-out;
        }
    </style>
</head>

<body class="h-[100dvh] flex flex-col justify-between text-white selection:bg-[#EAB308] selection:text-black relative">

    <div class="absolute inset-0 z-0 pointer-events-none flex justify-center items-center overflow-hidden">
        <div class="w-[600px] h-[600px] bg-[#EAB308] rounded-full mix-blend-screen filter blur-[150px] opacity-15"></div>
    </div>

    <main class="flex-grow flex flex-col justify-center items-center text-center px-6 z-10 w-full">
        
        <h1 class="text-transparent bg-clip-text bg-gradient-to-r from-[#FFD700] via-[#EAB308] to-[#B45309]
                   font-extrabold uppercase tracking-tighter
                   text-5xl md:text-7xl lg:text-9xl mb-6 drop-shadow-2xl">
            Remembered
        </h1>

        <p class="text-white/50 text-xs md:text-sm uppercase tracking-[0.4em] mb-16 font-bold">
            The AI Legacy Vault
        </p>

        <h2 class="font-extrabold leading-tight text-3xl md:text-5xl lg:text-7xl">
            Deine Geschichte.<br>
            <span class="text-white">Unvergessen.</span>
        </h2>

    </main>

    <footer class="pb-10 px-6 z-10 w-full flex justify-center safe-area-bottom">
        <div class="bg-white/5 border border-white/10 rounded-2xl p-5 backdrop-blur-md w-full max-w-xs text-left shadow-2xl">
            
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-3 h-3 bg-green-500 rounded-full status-dot"></div>
                <span class="text-white/50 text-[10px] font-bold tracking-widest uppercase">System Status</span>
            </div>

            <p class="text-lg font-bold mb-4 text-white">Building the Future.</p>
            
            <div class="border-t border-white/10 pt-3 flex justify-between items-end opacity-70">
                 <div class="flex flex-col">
                    <span class="text-[10px] uppercase tracking-wider mb-1 text-white/50">Operated by</span>
                    <span class="text-xs font-semibold mb-1">Legacy Global Ventures Ltd.</span>
                    <p class="text-[10px] text-gray-400">Limassol, Cyprus • London • Berlin</p>
                 </div>
                 <span class="text-xs font-mono text-[#EAB308]">2026</span>
            </div>
        </div>
    </footer>

</body>
</html>
