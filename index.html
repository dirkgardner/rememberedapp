<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remembered App - The Digital Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="h-screen flex flex-col justify-center items-center text-center p-6 bg-black">

    <div class="mb-10 animate-pulse">
        <h1 class="text-7xl font-extrabold tracking-tighter gradient-text mb-2">Remembered.</h1>
        <p class="text-gray-500 text-sm tracking-[0.4em] uppercase font-bold">The AI Legacy Vault</p>
    </div>

    <div class="max-w-2xl space-y-8">
        <p class="text-2xl text-gray-400 font-light leading-relaxed">
            Deine Geschichte. <span class="text-white font-medium">Unvergessen.</span>
        </p>
        
        <div class="inline-block p-6 bg-white/5 rounded-xl border border-white/10 backdrop-blur-md">
            <div class="flex items-center space-x-4 mb-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                <p class="text-sm text-gray-400 uppercase tracking-widest">System Status</p>
            </div>
            <p class="text-xl text-white font-mono">Building the Future.</p>
            <p class="text-sm text-gray-600 mt-2 font-mono">Launch: 2026</p>
        </div>
    </div>

    <div class="absolute bottom-10 text-center opacity-60">
        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Operated by</p>
        <p class="text-sm text-gray-400 font-semibold">Legacy Global Ventures Ltd.</p>
        <p class="text-[10px] text-gray-600">Limassol, Cyprus • London • Berlin</p>
    </div>

</body>
</html>
